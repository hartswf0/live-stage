<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Scene 06 — MONTE Stage</title>
<style>
  :root{--bg:#0a0a0c;--ink:#f2f2ee;--dim:rgba(242,242,238,.5);--line:rgba(242,242,238,.2);
    --hot:#9fe7ff;--green:#43c463;--red:#e8402f;--gold:#f1c40f;--accent:#2d8cff;--tile:#141417}
  *{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
  html,body{height:100%;background:var(--bg);color:var(--ink);
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;overflow:hidden}
  button{font-family:inherit}
  #app{position:fixed;inset:0;display:flex;flex-direction:column}

  /* ===================== TOP BAR ===================== */
  #bar{display:flex;gap:6px;align-items:center;padding:7px 10px;border-bottom:1px solid var(--line);
    font-size:11px;flex-wrap:wrap;flex:0 0 auto}
  #bar b{font-size:12px;letter-spacing:.12em;margin-right:2px}
  #bar button{border:1px solid var(--line);border-radius:8px;background:transparent;color:var(--ink);
    font:inherit;font-size:10px;font-weight:700;padding:7px 11px;cursor:pointer;letter-spacing:.04em}
  #bar button.on{border-color:var(--hot);color:var(--hot)}
  #golive{background:var(--red);border-color:var(--red);color:#fff}
  #bar .stat{flex:1;text-align:center;color:var(--dim);font-size:10px;white-space:nowrap;overflow:hidden}

  #scenes{display:flex;gap:6px;padding:8px 10px;border-bottom:1px solid var(--line);overflow-x:auto;flex:0 0 auto}
  #scenes button{flex:0 0 auto;border:1px solid var(--line);border-radius:9px;background:#101014;
    color:#dcdce0;font:inherit;font-size:11px;font-weight:700;padding:9px 12px;cursor:pointer;
    display:flex;flex-direction:column;gap:2px;min-width:112px;text-align:left;letter-spacing:.02em}
  #scenes button small{font-size:8.5px;color:var(--dim);font-weight:400;letter-spacing:0}
  #scenes button.on{background:var(--hot);border-color:var(--hot);color:#000}
  #scenes button.on small{color:rgba(0,0,0,.6)}

  /* ===================== TABLE VIEW ===================== */
  #table{flex:1 1 auto;min-height:0;display:flex;gap:8px;padding:8px;overflow-x:auto}
  .chan{flex:0 0 216px;display:flex;flex-direction:column;border:1px solid var(--line);border-radius:11px;
    overflow:hidden;background:var(--felt,#000)}
  .chan.live{border-color:var(--hot);box-shadow:0 0 0 1px var(--hot)}
  .chan.off{opacity:.45}
  .chan.dragover{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold)}
  .chd{display:flex;align-items:center;gap:7px;padding:8px 9px;border-bottom:1px solid var(--line);background:rgba(10,10,12,.9)}
  .chd .dot{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:700;color:#fff;flex:0 0 auto}
  .chd .nm{font-size:12px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chd .liveflag{font-size:8px;padding:2px 5px;border-radius:4px;background:var(--hot);color:#000;font-weight:800;display:none}
  .chan.live .liveflag{display:block}
  .chd .hbtn{border:1px solid var(--line);border-radius:5px;background:transparent;color:var(--dim);font-size:9px;padding:3px 6px;cursor:pointer}
  .chd .hbtn:hover{border-color:var(--hot);color:var(--hot)}

  .aud{display:flex;align-items:center;gap:6px;padding:7px 9px;border-bottom:1px solid var(--line);background:#0c0c0e;font-size:9px;color:var(--dim)}
  .aud button{border:1px solid var(--line);border-radius:6px;background:transparent;color:var(--ink);font:inherit;font-size:9px;font-weight:700;padding:4px 7px;cursor:pointer;flex:0 0 auto}
  .aud button.on{border-color:var(--green);color:var(--green)}
  .aud button.solo.on{border-color:var(--gold);color:var(--gold)}
  .aud input[type=range]{flex:1;height:16px;min-width:36px}
  .aud .vopill{font-size:8px;border:1px solid var(--line);border-radius:5px;padding:3px 5px;cursor:pointer}
  .aud .vopill.set{border-color:var(--hot);color:var(--hot)}

  .clips{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:5px;scrollbar-width:thin}
  .clip{position:relative;border:1px solid var(--line);border-radius:7px;overflow:hidden;cursor:grab;background:#111;height:74px;flex:0 0 auto;touch-action:none}
  .clip video,.clip img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.92;pointer-events:none}
  .clip .lb{position:absolute;left:5px;bottom:3px;font-size:9px;font-weight:700;color:#fff;text-shadow:0 1px 3px #000;z-index:2;pointer-events:none}
  .clip .num{position:absolute;left:4px;top:3px;font-size:8px;color:#000;background:var(--hot);padding:0 4px;border-radius:3px;font-weight:800;z-index:2;pointer-events:none}
  .clip .x{position:absolute;top:2px;right:2px;z-index:3;border:none;border-radius:4px;background:rgba(180,0,0,.85);color:#fff;font-size:9px;font-weight:800;padding:1px 5px;cursor:pointer;display:none}
  .clip:hover .x{display:block}
  .clip.playing{border-color:var(--green);box-shadow:0 0 10px rgba(67,196,99,.4)}
  .clip.playing .lb::after{content:' ● LIVE';color:var(--green)}
  .clip.lifting{opacity:.35;outline:2px dashed var(--hot)}
  .clip .scrub{position:absolute;left:0;bottom:0;height:2px;background:var(--hot);width:0;z-index:2;pointer-events:none}
  .addclip{border:1px dashed var(--line);border-radius:7px;height:38px;display:flex;align-items:center;justify-content:center;gap:6px;color:var(--dim);font-size:10px;font-weight:700;cursor:pointer;flex:0 0 auto}
  .addclip:hover{border-color:var(--hot);color:var(--hot)}

  .cfoot{display:flex;gap:4px;padding:6px;border-top:1px solid var(--line)}
  .cfoot button{flex:1;border:1px solid var(--line);border-radius:6px;background:transparent;color:#aaa;font:inherit;font-size:9px;font-weight:700;padding:6px 3px;cursor:pointer}
  .cfoot button.on{background:var(--hot);color:#000;border-color:var(--hot)}
  .cfoot button.on.red{background:var(--red);color:#fff;border-color:var(--red)}
  .cfoot button.play{border-color:var(--gold);color:var(--gold)}

  #ghost{position:fixed;z-index:70;width:88px;height:56px;border:1px solid var(--hot);border-radius:6px;overflow:hidden;pointer-events:none;display:none;box-shadow:0 6px 20px rgba(0,0,0,.8)}
  #ghost img{width:100%;height:100%;object-fit:cover}
  #dropline{position:fixed;z-index:65;height:3px;background:var(--hot);display:none;pointer-events:none;border-radius:2px;box-shadow:0 0 8px var(--hot)}

  #loupe{position:fixed;z-index:80;width:340px;background:#0d0d10;border:1px solid var(--hot);border-radius:10px;overflow:hidden;display:none;box-shadow:0 16px 50px rgba(0,0,0,.85)}
  #loupe video{width:100%;aspect-ratio:16/9;object-fit:cover;background:#000;display:block;cursor:pointer}
  #loupe .lp{padding:8px 10px;font-size:11px}#loupe .lp b{color:var(--hot)}
  #loupe .lb2{display:flex;gap:5px;padding:0 8px 8px;flex-wrap:wrap}
  #loupe .lb2 button{flex:1 0 auto;border:1px solid var(--line);border-radius:6px;background:transparent;color:var(--ink);font:inherit;font-size:9px;font-weight:700;padding:6px;cursor:pointer}
  #loupe .lb2 button:hover{border-color:var(--hot);color:var(--hot)}
  @media(pointer:coarse){#loupe{left:0!important;right:0!important;bottom:0!important;top:auto!important;width:100%!important;border-radius:14px 14px 0 0}}

  /* ===================== THEATRE (per-lane reel) ===================== */
  #theatre{position:fixed;inset:0;z-index:200;background:#000;display:none}
  #theatre.on{display:block}
  #theatre>video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}
  #thHud{position:absolute;top:12px;left:14px;font-size:11px;color:rgba(255,255,255,.7);text-shadow:0 1px 2px #000}
  #thX{position:absolute;top:10px;right:12px;z-index:2;border:1px solid rgba(255,255,255,.4);border-radius:7px;background:rgba(0,0,0,.55);color:#fff;font:inherit;font-size:11px;font-weight:700;padding:7px 13px;cursor:pointer}
  #thRail{position:absolute;left:10px;right:10px;bottom:56px;z-index:3;display:flex;gap:3px;height:30px}
  .thSeg{flex:1;border:1px solid rgba(255,255,255,.16);border-radius:5px;background:rgba(255,255,255,.04);position:relative;overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .thSeg .fill{position:absolute;left:0;top:0;bottom:0;width:0;background:rgba(159,231,255,.25)}
  .thSeg .lb{font-size:8px;color:rgba(255,255,255,.7);z-index:2;padding:0 4px;white-space:nowrap;overflow:hidden}
  .thSeg.cur{border-color:var(--hot)}.thSeg.done .fill{width:100%}
  #thCtl{position:absolute;left:50%;bottom:12px;transform:translateX(-50%);display:flex;gap:7px;z-index:3}
  #thCtl button{border:1px solid rgba(255,255,255,.35);border-radius:8px;background:rgba(0,0,0,.6);color:#fff;font:inherit;font-size:12px;font-weight:700;padding:8px 14px;cursor:pointer}

  /* ===================== STAGE VIEW (recordable Zoom) ===================== */
  #stage{position:fixed;inset:0;z-index:150;background:#0b0b0d;display:none;flex-direction:column}
  #stage.on{display:flex}
  .stop{height:36px;background:#161619;display:flex;align-items:center;justify-content:space-between;padding:0 12px;font-size:12px;color:var(--dim);flex:0 0 auto;border-bottom:1px solid #000}
  .srec{display:flex;gap:6px;align-items:center;color:#e5e5e8}
  .srec .dot{width:9px;height:9px;border-radius:50%;background:var(--red);animation:blink 1.5s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
  .spill{background:#2a2a30;border-radius:5px;padding:3px 9px;font-size:11px;color:#d8d8dc}
  #sgrid{flex:1 1 auto;display:grid;gap:4px;padding:5px;grid-template-columns:1fr 1fr;grid-auto-rows:1fr;background:#0b0b0d}
  .stile{position:relative;background:var(--tile);overflow:hidden;outline:0 solid var(--accent);transition:outline-width .1s}
  .stile.spk{outline-width:4px;z-index:2}
  .stile video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#0e0e11;opacity:0;transition:opacity .1s}
  .stile video.on{opacity:1}
  .stile.mir video.live{transform:scaleX(-1)}
  .sph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 42%,#22222c,#0e0e12);z-index:1}
  .sph .av{width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:600;color:#fff}
  .stile.has .sph{display:none}
  .snm{position:absolute;left:7px;bottom:7px;background:rgba(0,0,0,.55);padding:2px 8px;border-radius:4px;font-size:12px;font-weight:500;display:flex;gap:5px;align-items:center;z-index:3;color:#fff}
  .snm .h{font-size:8px;background:var(--accent);color:#fff;padding:1px 4px;border-radius:3px;text-transform:uppercase}
  .snm.mut::before{content:'';width:11px;height:11px;flex:0 0 auto;background:currentColor;opacity:.85;-webkit-mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45.05-.63zM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73 4.27 3z'/></svg>") center/contain no-repeat;mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45.05-.63zM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73 4.27 3z'/></svg>") center/contain no-repeat}
  .sgl{position:absolute;inset:0;z-index:4;pointer-events:none;opacity:0}
  .stile.gl .sgl{opacity:1;background:repeating-linear-gradient(0deg,rgba(45,140,255,.18) 0 2px,transparent 2px 4px),#05070d;animation:gf .15s steps(2) infinite}
  @keyframes gf{0%{transform:translateX(0);opacity:.9}50%{transform:translateX(3px);opacity:.4}100%{transform:translateX(-2px)}}
  .stile.gl video,.stile.gl .sph{filter:hue-rotate(35deg) contrast(1.3) saturate(0)}
  #stoast{position:absolute;top:48px;right:14px;z-index:20;background:#26262b;border:1px solid #34343a;border-radius:10px;padding:12px 14px;width:270px;box-shadow:0 12px 40px rgba(0,0,0,.6);display:none}
  #stoast.on{display:block}
  #stoast .a{font-size:12px;font-weight:600;color:#fff;margin-bottom:3px}#stoast .b{font-size:11px;color:var(--dim)}
  .sbot{height:52px;background:#1b1b1f;display:flex;align-items:center;justify-content:center;gap:16px;flex:0 0 auto;border-top:1px solid #000;position:relative}
  .sc{display:flex;flex-direction:column;align-items:center;gap:2px;color:#f3f3f5;font-size:9px}
  .sc svg{width:20px;height:20px;fill:currentColor}.sc span{color:#9a9aa2}
  .sc.leave .lp{background:var(--red);color:#fff;padding:6px 13px;border-radius:6px;font-size:12px;font-weight:600}
  /* floating director controls INSIDE the stage — hide with H before recording */
  #sdock{position:absolute;left:0;right:0;bottom:52px;z-index:30;background:rgba(9,9,11,.94);border-top:1px solid #2a2a30;padding:8px 10px;display:flex;gap:6px;overflow-x:auto;backdrop-filter:blur(8px)}
  #sdock.hidden{display:none}
  #sdock .sc-scene{flex:0 0 auto;border:1px solid var(--line);border-radius:8px;background:#141418;color:#dcdce0;font:inherit;font-size:10px;font-weight:700;padding:7px 10px;cursor:pointer}
  #sdock .sc-scene.on{background:var(--hot);border-color:var(--hot);color:#000}
  #sdock .grp{display:flex;gap:4px;flex:0 0 auto;border-left:1px solid var(--line);padding-left:6px;margin-left:2px}
  #sdock .grp .gp{font-size:8px;color:var(--dim);align-self:center;margin-right:2px}
  #sdock .grp button{border:1px solid var(--line);border-radius:6px;background:#0e0e12;color:#bbb;font:inherit;font-size:9px;font-weight:700;padding:5px 7px;cursor:pointer}
  #sdock .grp button.on{background:var(--hot);color:#000;border-color:var(--hot)}
  #shide{position:absolute;top:44px;left:12px;z-index:31;border:1px solid var(--line);border-radius:7px;background:rgba(0,0,0,.5);color:#fff;font:inherit;font-size:10px;font-weight:700;padding:6px 10px;cursor:pointer}
  #exitStage{position:absolute;top:44px;right:12px;z-index:31;border:1px solid var(--hot);border-radius:7px;background:rgba(0,0,0,.5);color:var(--hot);font:inherit;font-size:10px;font-weight:700;padding:6px 12px;cursor:pointer}

  input[type=file]{display:none}
  .toast{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);z-index:210;background:#141418;border:1px solid var(--hot);border-radius:8px;padding:8px 14px;font-size:11px;color:var(--hot);display:none;box-shadow:0 8px 30px rgba(0,0,0,.6)}
  .toast.on{display:block}
</style>

  /**

      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        if (i == 0 || minLostPoint > lostPoint) {

    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

      for (var i = 0; i < 15; i += 1) {

      var row = _moduleCount - 1;
      var bitIndex = 7;

              _modules[row][col - c] = dark;

        var b0 = bin.read();

        var b2 = read();
        var b3 = read();

      var bytes = [];

        var c = s.charCodeAt(i);
        if (c < 128) {
          bytes.push(c);

    };

    _this.write = function(out) {

      //---------------------------------
      // GIF Signature

      out.writeString('GIF87a');

      //---------------------------------
      // Screen Descriptor

      out.writeShort(_width);
      out.writeShort(_height);

      out.writeByte(0x80); // 2bit
      out.writeByte(0);
      out.writeByte(0);

      //---------------------------------
      // Global Color Map

      // black
      out.writeByte(0x00);
      out.writeByte(0x00);
      out.writeByte(0x00);

      // white
      out.writeByte(0xff);
      out.writeByte(0xff);
      out.writeByte(0xff);

      //---------------------------------
      // Image Descriptor

      out.writeString(',');
      out.writeShort(0);
      out.writeShort(0);
      out.writeShort(_width);
      out.writeShort(_height);
      out.writeByte(0);

      //---------------------------------
      // Local Color Map

      //---------------------------------
      // Raster Data

      var lzwMinCodeSize = 2;
      var raster = getLZWRaster(lzwMinCodeSize);

      out.writeByte(lzwMinCodeSize);

      var offset = 0;

      while (raster.length - offset > 255) {
        out.writeByte(255);
        out.writeBytes(raster, offset, 255);
        offset += 255;
      }

      out.writeByte(raster.length - offset);
      out.writeBytes(raster, offset, raster.length - offset);
      out.writeByte(0x00);

      //---------------------------------
      // GIF Terminator
      out.writeString(';');
    };

    var bitOutputStream = function(out) {

      var _out = out;
      var _bitLength = 0;
      var _bitBuffer = 0;

      var _this = {};

      _this.write = function(data, length) {

        if ( (data >>> length) != 0) {
          throw 'length over';
        }

        while (_bitLength + length >= 8) {
          _out.writeByte(0xff & ( (data << _bitLength) | _bitBuffer) );
          length -= (8 - _bitLength);
          data >>>= (8 - _bitLength);
          _bitBuffer = 0;
          _bitLength = 0;
        }

        _bitBuffer = (data << _bitLength) | _bitBuffer;
        _bitLength = _bitLength + length;
      };

      _this.flush = function() {
        if (_bitLength > 0) {
          _out.writeByte(_bitBuffer);
        }
      };

      return _this;
    };

    var getLZWRaster = function(lzwMinCodeSize) {

      var clearCode = 1 << lzwMinCodeSize;
      var endCode = (1 << lzwMinCodeSize) + 1;
      var bitLength = lzwMinCodeSize + 1;

      // Setup LZWTable
      var table = lzwTable();

      for (var i = 0; i < clearCode; i += 1) {
        table.add(String.fromCharCode(i) );
      }
      table.add(String.fromCharCode(clearCode) );
      table.add(String.fromCharCode(endCode) );

      var byteOut = byteArrayOutputStream();
      var bitOut = bitOutputStream(byteOut);

      // clear code
      bitOut.write(clearCode, bitLength);

      var dataIndex = 0;

      var s = String.fromCharCode(_data[dataIndex]);
      dataIndex += 1;

      while (dataIndex < _data.length) {

        var c = String.fromCharCode(_data[dataIndex]);
        dataIndex += 1;

        if (table.contains(s + c) ) {

          s = s + c;

        } else {

          bitOut.write(table.indexOf(s), bitLength);

          if (table.size() < 0xfff) {

            if (table.size() == (1 << bitLength) ) {
              bitLength += 1;
            }

            table.add(s + c);
          }

          s = c;
        }
      }

      bitOut.write(table.indexOf(s), bitLength);

      // end code
      bitOut.write(endCode, bitLength);

      bitOut.flush();

      return byteOut.toByteArray();
    };

    var lzwTable = function() {

      var _map = {};
      var _size = 0;

      var _this = {};

      _this.add = function(key) {
        if (_this.contains(key) ) {
          throw 'dup key:' + key;
        }
        _map[key] = _size;
        _size += 1;
      };

      _this.size = function() {
        return _size;
      };

      _this.indexOf = function(key) {
        return _map[key];
      };

      _this.contains = function(key) {
        return typeof _map[key] != 'undefined';
      };

      return _this;
    };

    return _this;
  };

  var createDataURL = function(width, height, getPixel) {
    var gif = gifImage(width, height);
    for (var y = 0; y < height; y += 1) {
      for (var x = 0; x < width; x += 1) {
        gif.setPixel(x, y, getPixel(x, y) );
      }
    }

    var b = byteArrayOutputStream();
    gif.write(b);

    var base64 = base64EncodeOutputStream();
    var bytes = b.toByteArray();
    for (var i = 0; i < bytes.length; i += 1) {
      base64.writeByte(bytes[i]);
    }
    base64.flush();

    return 'data:image/gif;base64,' + base64;
  };

  // returns qrcode function.

  return qrcode;

!function() {

  qrcode.stringToBytesFuncs['UTF-8'] = function(s) {
    // http://stackoverflow.com/questions/18729405/how-to-convert-utf8-string-to-byte-array
    function toUTF8Array(str) {

        var charcode = str.charCodeAt(i);

        else {

          // UTF-16 encodes 0x10000-0x10FFFF by
          // subtracting 0x10000 and splitting the
          // 20 bits of 0x0-0xFFFFF into two halves
          charcode = 0x10000 + (((charcode & 0x3ff)<<10)
            | (str.charCodeAt(i) & 0x3ff));

              0x80 | ((charcode>>12) & 0x3f),
              0x80 | ((charcode>>6) & 0x3f),

<script>
/* ============ CAST ============ */
const PEOPLE=[
  {id:'nat',  name:'Natalie', hue:0,  initials:'N',live:true,host:true},
  {id:'chris',name:'Chris',   hue:212,initials:'C'},
  {id:'sam',  name:'Samantha',hue:266,initials:'S'},
  {id:'ernie',name:'Ernie',   hue:152,initials:'E'},
  {id:'phil', name:'Phil',    hue:26, initials:'P'},
  {id:'devon',name:'Devon',   hue:352,initials:'D'},
  {id:'priya',name:'Priya',   hue:188,initials:'R'},
];
const P=Object.fromEntries(PEOPLE.map(p=>[p.id,p]));
const AI=PEOPLE.filter(p=>!p.live);
const hsl=(h,s,l)=>`hsl(${h} ${s}% ${l}%)`;

/* ============ CLIPS ============ */
const DIR='clips/';
const BASECLIPS=[
  {pid:'chris',label:'watching', file:'African-American_man_watching_sc__202607140033.mp4'},
  {pid:'chris',label:'listening',file:'African-American_man_listening_w__202607140033.mp4'},
  {pid:'chris',label:'typing',   file:'African-American_man_typing_message_202607140033.mp4'},
  {pid:'sam',  label:'listening',file:'Asian_woman_listening_to_lens_202607140033.mp4'},
  {pid:'sam',  label:'looking',  file:'Asian_woman_listening_webcam_beh__202607140033.mp4'},
  {pid:'sam',  label:'pen',      file:'Asian_woman_playing_with_pen_202607140033.mp4'},
  {pid:'ernie',label:'looking',  file:'Latino_man_looking_at_camera_202607140033.mp4'},
  {pid:'ernie',label:'looking2', file:'Latino_man_looking_at_lens_202607140033.mp4'},
  {pid:'ernie',label:'laughing', file:'Latino_man_laughing_at_monitor_202607140033.mp4'},
  {pid:'ernie',label:'tapping',  file:'Latino_man_tapping_pen_202607140033.mp4'},
  {pid:'ernie',label:'webcam',   file:'Latino_man_webcam_behavior_202607140033.mp4'},
  {pid:'phil', label:'speaking', file:'Man_speaking_in_video_meeting_202607140033.mp4'},
  {pid:'phil', label:'looking',  file:'Man_looking_at_webcam_202607140033.mp4'},
  {pid:'phil', label:'nodding',  file:'Man_nodding_at_camera_202607140033.mp4'},
  {pid:'devon',label:'watching', file:'Man_watching_meeting_casually_202607140033.mp4'},
  {pid:'devon',label:'listening',file:'Man_listening_to_webcam_202607140033.mp4'},
  {pid:'devon',label:'leaning',  file:'Man_leaning_back_looking_screen_202607140033.mp4'},
  {pid:'devon',label:'intent',   file:'Man_watching_intently_webcam_202607140033.mp4'},
  {pid:'devon',label:'nodding',  file:'Man_nodding_in_office_202607140033.mp4'},
  {pid:'priya',label:'listening',file:'South_Asian_woman_listening_webcam_202607140033.mp4'},
];
let CLIP={},LANES={},cCounter=0;
AI.forEach(p=>LANES[p.id]=[]);
function regClip(o){const id='c'+(cCounter++);CLIP[id]={id,...o};return id;}
const SAVEKEY='scene6monte';
function seed(){CLIP={};LANES={};cCounter=0;AI.forEach(p=>LANES[p.id]=[]);
  BASECLIPS.forEach(c=>{const id=regClip({label:c.label,file:c.file,src:DIR+encodeURIComponent(c.file)});LANES[c.pid].push(id);});}
function saveTable(){const clips={};Object.values(CLIP).forEach(c=>{if(c.file)clips[c.id]={label:c.label,file:c.file};});
  const lanes={};AI.forEach(p=>lanes[p.id]=LANES[p.id].filter(id=>CLIP[id]&&CLIP[id].file));
  try{localStorage.setItem(SAVEKEY,JSON.stringify({clips,lanes,cCounter}));}catch(e){}}
function loadTable(){try{const s=JSON.parse(localStorage.getItem(SAVEKEY)||'null');if(!s||!s.clips)return false;
  CLIP={};LANES={};AI.forEach(p=>LANES[p.id]=[]);cCounter=s.cCounter||0;
  Object.entries(s.clips).forEach(([id,c])=>CLIP[id]={id,label:c.label,file:c.file,src:DIR+encodeURIComponent(c.file)});
  AI.forEach(p=>LANES[p.id]=(s.lanes[p.id]||[]).filter(id=>CLIP[id]));return true;}catch(e){return false;}}
if(!loadTable())seed();

/* ============ SCENES ============ */
const SCENES={
  team:    {name:'Team',    desc:'onboarding',stiles:['nat','chris','sam','ernie'],cols:2,view:'Gallery View',nvp:1,spk:'chris',pick:{chris:'listening',sam:'listening',ernie:'looking'}},
  spin:    {name:'Spinning',desc:'confused',  stiles:['nat','chris','sam','ernie'],cols:2,view:'Gallery View',nvp:1,spk:'sam',pick:{chris:'watching',sam:'looking',ernie:'laughing'}},
  glitch:  {name:'Glitch',  desc:'Nat fades', stiles:['nat','chris','sam','ernie'],cols:2,view:'Gallery View',nvp:1,spk:null,gl:'nat',pick:{chris:'watching',sam:'pen',ernie:'tapping'}},
  incoming:{name:'Incoming',desc:'toast',     stiles:['nat','chris','sam','ernie'],cols:2,view:'Gallery View',nvp:1,spk:null,toast:true,pick:{chris:'listening',sam:'listening',ernie:'looking'}},
  phil:    {name:'Phil',    desc:'1:1 review',stiles:['phil','nat'],cols:2,view:'Speaker View',nvp:0,spk:'phil',pick:{phil:'speaking'}},
  monster: {name:'Monster', desc:'Roomba',    stiles:['phil','nat'],cols:2,view:'Speaker View',nvp:0,spk:'phil',pick:{phil:'nodding'}},
};
const SORDER=Object.keys(SCENES);

/* ============ STATE ============ */
const ST={live:{},aud:{},scene:null,master:true,inStage:false,
  flags:{}, // pid -> {spk,mut,gl}
};
PEOPLE.forEach(p=>{ST.aud[p.id]={on:false,vol:1,solo:false,vo:null};ST.flags[p.id]={spk:false,mut:false,gl:false};});

/* ============ SINGLE SET OF VIDEO ELEMENTS PER CLIP, REUSED IN STAGE ============
   The stage tiles hold the real playing <video> per character. */
const stageVids={}; // pid -> {clipId->video}
let liveStream=null;

/* ============ toast ============ */
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),1400);}

/* ============ TABLE ============ */
const table=document.getElementById('table');
function buildTable(){
  table.innerHTML='';
  AI.forEach(p=>{
    const ch=document.createElement('div');ch.className='chan';ch.id='ch-'+p.id;ch.dataset.pid=p.id;
    ch.style.setProperty('--felt',hsl(p.hue,40,6));ch.style.borderColor=hsl(p.hue,35,22);
    const a=ST.aud[p.id];
    ch.innerHTML=`
      <div class="chd"><div class="dot" style="background:${hsl(p.hue,55,45)}">${p.initials}</div>
        <div class="nm" style="color:${hsl(p.hue,70,68)}">${p.name}</div>
        <span class="liveflag">LIVE</span>
        <button class="hbtn" data-a="ren" data-p="${p.id}">✎</button></div>
      <div class="aud">
        <button class="amute ${a.on?'on':''}" data-p="${p.id}">${a.on?'AUD':'mute'}</button>
        <button class="solo ${a.solo?'on':''}" data-p="${p.id}">solo</button>
        <input type="range" class="avol" data-p="${p.id}" min="0" max="100" value="${Math.round(a.vol*100)}">
        <span class="vopill ${a.vo?'set':''}" data-p="${p.id}">${a.vo?'VO✓':'+VO'}</span></div>
      <div class="clips" id="clips-${p.id}"></div>
      <div class="cfoot">
        <button class="fplay play" data-p="${p.id}">▶ LANE</button>
        <button class="fspk" data-p="${p.id}">Speak</button>
        <button class="fmut" data-p="${p.id}">Mute</button>
        <button class="fgl red" data-p="${p.id}">Glitch</button></div>`;
    table.appendChild(ch);
    renderLane(p.id);
    const vin=document.createElement('input');vin.type='file';vin.accept='audio/*';vin.dataset.p=p.id;vin.className='voin';ch.appendChild(vin);
  });
  wireControls();
}
function renderLane(pid){
  const list=document.getElementById('clips-'+pid);if(!list)return;list.innerHTML='';
  LANES[pid].forEach((cid,i)=>{const c=CLIP[cid];if(!c)return;
    const el=document.createElement('div');el.className='clip'+(ST.live[pid]===cid?' playing':'');
    el.id='clip-'+cid;el.dataset.cid=cid;el.dataset.pid=pid;
    el.innerHTML=`<video muted preload="metadata" src="${c.src}#t=0.5"></video><div class="num">${i+1}</div><div class="lb">${c.label}</div><div class="scrub"></div><button class="x">✕</button>`;
    list.appendChild(el);});
  const add=document.createElement('div');add.className='addclip';add.dataset.p=pid;add.innerHTML='<span style="font-size:14px">+</span> add clips';
  const fin=document.createElement('input');fin.type='file';fin.accept='video/*';fin.multiple=true;fin.className='clipin';
  add.onclick=()=>fin.click();
  fin.onchange=e=>{[...e.target.files].forEach(f=>{const id=regClip({label:f.name.replace(/\.[^.]+$/,'').slice(0,16),src:URL.createObjectURL(f),custom:true});LANES[pid].push(id);});renderLane(pid);saveTable();toast('added to '+P[pid].name);};
  list.appendChild(add);list.appendChild(fin);
  wireClips(pid);
}
function wireControls(){
  table.querySelectorAll('.amute').forEach(b=>b.onclick=()=>{const p=b.dataset.p;ST.aud[p].on=!ST.aud[p].on;applyAudio();refreshAud();});
  table.querySelectorAll('.solo').forEach(b=>b.onclick=()=>{const p=b.dataset.p;ST.aud[p].solo=!ST.aud[p].solo;applyAudio();refreshAud();});
  table.querySelectorAll('.avol').forEach(r=>r.oninput=()=>{ST.aud[r.dataset.p].vol=+r.value/100;applyAudio();});
  table.querySelectorAll('.vopill').forEach(s=>s.onclick=()=>table.querySelector(`.voin[data-p="${s.dataset.p}"]`).click());
  table.querySelectorAll('.voin').forEach(inp=>inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const p=e.target.dataset.p;ST.aud[p].vo=URL.createObjectURL(f);ST.aud[p].on=true;applyAudio();refreshAud();toast(P[p].name+' VO loaded');});
  table.querySelectorAll('.fplay').forEach(b=>b.onclick=()=>theatreLane(b.dataset.p));
  table.querySelectorAll('.fspk').forEach(b=>b.onclick=()=>{const p=b.dataset.p;setFlag(p,'spk',!ST.flags[p].spk,true);});
  table.querySelectorAll('.fmut').forEach(b=>b.onclick=()=>{const p=b.dataset.p;setFlag(p,'mut',!ST.flags[p].mut);});
  table.querySelectorAll('.fgl').forEach(b=>b.onclick=()=>{const p=b.dataset.p;setFlag(p,'gl',!ST.flags[p].gl);});
  table.querySelectorAll('.hbtn[data-a=ren]').forEach(b=>b.onclick=()=>{const p=b.dataset.p;const nm=prompt('Rename '+P[p].name,P[p].name);if(nm){P[p].name=nm;buildTable();buildStage();}});
  refreshFlags();
}
function refreshAud(){AI.forEach(p=>{const a=ST.aud[p.id];const ch=document.getElementById('ch-'+p.id);if(!ch)return;
  const mb=ch.querySelector('.amute');mb.classList.toggle('on',a.on);mb.textContent=a.on?'AUD':'mute';
  ch.querySelector('.solo').classList.toggle('on',a.solo);ch.querySelector('.vopill').classList.toggle('set',!!a.vo);});}
function refreshFlags(){AI.forEach(p=>{const f=ST.flags[p.id];const ch=document.getElementById('ch-'+p.id);if(!ch)return;
  ch.querySelector('.fspk').classList.toggle('on',f.spk);
  ch.querySelector('.fmut').classList.toggle('on',f.mut);
  ch.querySelector('.fgl').classList.toggle('on',f.gl);});}

/* ============ clip interactions ============ */
let drag=null;
const ghost=document.getElementById('ghost'),dropline=document.getElementById('dropline');
function wireClips(pid){
  document.querySelectorAll('#clips-'+pid+' .clip').forEach(el=>{
    const cid=el.dataset.cid;
    el.addEventListener('pointermove',e=>{if(drag)return;const v=el.querySelector('video');if(!v)return;
      const r=el.getBoundingClientRect();const frac=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
      if(v.readyState>=1&&v.duration){try{v.currentTime=frac*v.duration;}catch(_){}el.querySelector('.scrub').style.width=(frac*100)+'%';}});
    el.querySelector('.x').onclick=e=>{e.stopPropagation();removeClip(pid,cid);};
    el.addEventListener('click',()=>{if(el._moved){el._moved=false;return;}goLive(pid,cid);});
    el.addEventListener('dblclick',()=>openLoupe(pid,cid));
    el.addEventListener('pointerdown',e=>startDrag(e,pid,cid,el));

}
function startDrag(e,pid,cid,el){if(e.target.classList.contains('x'))return;drag={pid,cid,el,x:e.clientX,y:e.clientY,active:false};}

  if(!drag)return;
  if(!drag.active){if(Math.hypot(e.clientX-drag.x,e.clientY-drag.y)<6)return;drag.active=true;drag.el.classList.add('lifting');drag.el._moved=true;ghost.querySelector('img').src='';ghost.style.display='block';}
  ghost.style.left=(e.clientX+10)+'px';ghost.style.top=(e.clientY+10)+'px';
  const chEl=document.elementsFromPoint(e.clientX,e.clientY).find(x=>x.classList&&x.classList.contains('chan'));
  document.querySelectorAll('.chan.dragover').forEach(c=>c.classList.remove('dragover'));dropline.style.display='none';
  if(!chEl){drag.tgt=null;return;}chEl.classList.add('dragover');

function ensureStageVideo(pid,cid){
  const c=CLIP[cid];if(!c)return null;

  document.getElementById('ch-'+pid)?.classList.add('live');

/* ============ per-character audio ============ */
const audioEls={};
function applyAudio(){
  const anySolo=AI.some(p=>ST.aud[p.id].solo);
  AI.forEach(p=>{const a=ST.aud[p.id];const cid=ST.live[p.id];let el=audioEls[p.id];
    const wantSrc=a.vo||(cid?CLIP[cid].src:null);
    const shouldPlay=ST.master&&a.on&&wantSrc&&(!anySolo||a.solo);
    // the actual stage video also carries audio; keep it muted, we monitor via Audio elements
    if(!shouldPlay){if(el)el.pause();return;}
    if(!el){el=new Audio();el.loop=true;audioEls[p.id]=el;}

/* ---- score model ---- */
function loadScore(){try{const s=JSON.parse(localStorage.getItem(SCOREKEY)||'null');
  if(s){SCORE.rowDur=s.rowDur||10;SCORE.loop=s.loop!==false;SCORE.spk=s.spk||{};SCORE.cell=s.cell||{};SCORE.rows=s.rows||null;}}catch(e){}durI.value=SCORE.rowDur;}
function saveScore(){try{localStorage.setItem(SCOREKEY,JSON.stringify(SCORE));}catch(e){}}
function scoreRows(){return ensureRows().length;}
/* THE SCORE IS A DOCUMENT, NOT A DERIVATION.
   SCORE.rows is an explicit array — each row is {dur, cells:{laneId: takeIdx|-1}}.
   It is SEEDED once from lane order (that is all the old "built-in order" ever was),
   then owned by you: add/delete rows, pin any take to any cell, REST a lane for a
   row (-1 → its tile leaves the mosaic), give a row its own duration so time is a
   rhythm, not a metronome. Persists, syncs, survives the clock. */
function seedRows(n){
  let maxL=0;AI.forEach(p=>{maxL=Math.max(maxL,(LANES[p.id]||[]).length);});
  const N=Math.max(1,Math.min(24,n||Math.min(maxL||1,12)));
  const rows=[];for(let r=0;r<N;r++)rows.push({dur:null,cells:{}});
  return rows;
}
function ensureRows(){
  if(!SCORE.rows||!SCORE.rows.length)SCORE.rows=seedRows();
  if(SCORE.cell&&Object.keys(SCORE.cell).length){   // migrate legacy pins
    Object.entries(SCORE.cell).forEach(([k,idx])=>{const [r,pid]=k.split('|');
      if(SCORE.rows[+r])SCORE.rows[+r].cells[pid]=idx;});
    SCORE.cell={};
  }
  return SCORE.rows;
}
function rowDurOf(r){const rows=ensureRows();return (rows[r]&&rows[r].dur)||SCORE.rowDur;}
function rowStart(r){let t=0;for(let i=0;i<r;i++)t+=rowDurOf(i);return t;}
function rowAt(t){const rows=ensureRows();let acc=0;
  for(let i=0;i<rows.length;i++){acc+=rowDurOf(i);if(t<acc)return i;}return rows.length;}
function rowCell(pid,r){const l=LANES[pid]||[];if(!l.length)return null;
  const row=ensureRows()[r];const ov=row?row.cells[pid]:undefined;
  if(ov===-1)return null;                       // RESTING this row — leaves the mosaic
  if(ov!=null&&l[ov])return l[ov];
  return l[Math.min(r,l.length-1)];
}
function pinCell(pid,r,idx){const rows=ensureRows();if(rows[r])rows[r].cells[pid]=idx;}
function unpinCell(pid,r){const rows=ensureRows();if(rows[r])delete rows[r].cells[pid];}
function scoreEdited(){saveScore();sendCue({t:'score',score:SCORE});
  if(typeof scoreHUD==='function')scoreHUD();}
function addRow(){if(scoreRows()>=24)return;ensureRows().push({dur:null,cells:{}});scoreEdited();}

/* ---- REMOTE: cross-device cue bus (phone / second machine) over the thunder relay ----
   BroadcastChannel only reaches windows on THIS machine. For a QR-paired controller on
   another device, cues travel via the already-deployed Cloudflare DO relay
   (thunder-rigs-relay.hartswf0.workers.dev): join a room, POST cues, poll for them.
   REMOTE button = create/join room + show the QR. ?remote=CODE = the controller panel. */
const RELAY='https://thunder-rigs-relay.hartswf0.workers.dev/trig/';
const IS_REMOTE=(new URLSearchParams(location.search).get('remote')||'').toUpperCase()||null;
const ROOM_OVERRIDE=(new URLSearchParams(location.search).get('room')||'').toUpperCase().replace(/[^A-Z0-9-]/g,'')||null;
const relay={room:null,peer:null,after:0,on:false,timer:null,lastState:0};
async function relayJoin(code,name){
  relay.room=String(code).toUpperCase().replace(/[^A-Z0-9-]/g,'').slice(0,16);
  try{
    const r=await fetch(RELAY+encodeURIComponent(relay.room)+'/join',{method:'POST',body:JSON.stringify({name})});
    const d=await r.json();if(!d.peerId)return false;
    relay.peer=d.peerId;relay.after=d.seq||0;relay.on=true;
    clearInterval(relay.timer);relay.timer=setInterval(relayPoll,IS_REMOTE?700:900);
    setTimeout(pullSnapshot,300);   // late joiner (remote included) catches up from the room snapshot
    return true;
  }catch(e){return false;}
}
async function relayPoll(){
  if(!relay.on)return;
  try{
    /* no-store is load-bearing: the relay sends no Cache-Control, so a repeated
       same-URL GET (quiet room -> same 'after') gets served from HTTP cache forever
       and the poll loop wedges on a stale empty response */
    const r=await fetch(RELAY+encodeURIComponent(relay.room)+'/poll?peerId='+relay.peer+'&after='+relay.after,{cache:'no-store'});
    const d=await r.json();
    if(typeof d.seq==='number'&&d.seq<relay.after)relay.after=d.seq;   // DO evicted & seq rewound
    (d.messages||[]).forEach(m=>{
      if(m.seq>relay.after)relay.after=m.seq;
      if(m.from!==relay.peer&&m.msg&&m.msg.t){
        if(IS_REMOTE){
          if(m.msg.t==='state')remoteState(m.msg);
          else if(m.msg.t==='table'||m.msg.t==='score'){handleCue(m.msg);if(typeof remoteGrid==='function')remoteGrid();}
        }else handleCue(m.msg);
      }
    });
  }catch(e){}
}
document.addEventListener('visibilitychange',()=>{   // a re-surfaced window catches up instantly
  if(document.visibilityState==='visible'&&relay.on)relayPoll();});
function relaySend(m){
  if(!relay.on)return;
  if(m.t==='state'){const now=performance.now();if(now-relay.lastState<1200)return;relay.lastState=now;}
  fetch(RELAY+encodeURIComponent(relay.room)+'/send',{method:'POST',body:JSON.stringify({peerId:relay.peer,msg:m})}).catch(()=>{});
}

/* ---- EDIT-SYNC: the table itself travels ----
   Every table edit broadcasts a versioned payload (debounced) AND stores it as the
   room snapshot on the relay; every joining window pulls the snapshot first. So a
   phone or second computer that arrives late still gets the current lanes/clips,
   and simultaneous edits resolve last-write-wins by version. Apply never
   re-broadcasts (echo-proof); versions guard replays. */
let lastAppliedVer=0,tableTimer=null;
function broadcastTable(){
  clearTimeout(tableTimer);
  tableTimer=setTimeout(()=>{
    const data=tableData();if(!data)return;
    let s='';try{s=JSON.stringify(data);}catch(e){return;}
    if(s.length>120000){toast('table too big to sync');return;}
    const v=Date.now();lastAppliedVer=v;
    sendCue({t:'table',v,data});
    if(relay.on)fetch(RELAY+encodeURIComponent(relay.room)+'/snapshot',
      {method:'POST',body:JSON.stringify({peerId:relay.peer,snapshot:{v,data}})}).catch(()=>{});
  },400);
}
async function pullSnapshot(){
  if(!relay.on)return;
  try{
    const r=await fetch(RELAY+encodeURIComponent(relay.room)+'/snapshot',{cache:'no-store'});
    const d=await r.json();const sn=d&&d.snapshot;
    if(sn&&sn.data&&(sn.v||0)>lastAppliedVer)applyTableData(sn.v,sn.data);
  }catch(e){}
}
const __save0=saveTable;saveTable=function(){__save0();broadcastTable();};
const __hc1=handleCue;handleCue=function(m){
  if(m&&m.t==='table'&&m.data){applyTableData(m.v||0,m.data);if(IS_REMOTE&&typeof remoteGrid==='function')remoteGrid();return;}
  __hc1(m);
};
function tableData(){
  const clips={};Object.values(CLIP).forEach(c=>{if(c.file)clips[c.id]={label:c.label,file:c.file};});
  const lanes={};AI.forEach(p=>lanes[p.id]=(LANES[p.id]||[]).filter(id=>CLIP[id]&&CLIP[id].file));
  return {people:AI.map(p=>({id:p.id,name:p.name,hue:p.hue,initials:p.initials})),clips,lanes,score:SCORE,cc:cCounter};
}
function applyTableData(v,data){
  if(v&&v<=lastAppliedVer)return;lastAppliedVer=v||Date.now();
  try{
    CLIP={};AI.length=0;PEOPLE.length=1;
    Object.keys(P).forEach(k=>{if(k!=='nat')delete P[k];});
    Object.keys(LANES).forEach(k=>delete LANES[k]);
    (data.people||[]).forEach(pp=>{const p={id:pp.id,name:pp.name,hue:pp.hue,initials:pp.initials};
      PEOPLE.push(p);P[p.id]=p;AI.push(p);
      ST.aud[p.id]=ST.aud[p.id]||{on:false,vol:1,solo:false,vo:null};
      ST.flags[p.id]=ST.flags[p.id]||{spk:false,mut:false,gl:false};LANES[p.id]=[];});
    Object.entries(data.clips||{}).forEach(([id,c])=>CLIP[id]={id,label:c.label,file:c.file,src:DIR+encodeURIComponent(c.file)});
    Object.entries(data.lanes||{}).forEach(([pid,ids])=>{if(LANES[pid])LANES[pid]=ids.filter(id=>CLIP[id]);});
    cCounter=Math.max(cCounter,(data.cc||0));
    Object.keys(ST.live).forEach(pid=>{if(!CLIP[ST.live[pid]])delete ST.live[pid];});
    if(data.score){Object.assign(SCORE,data.score);const i=document.getElementById('rowDur');if(i)i.value=SCORE.rowDur;saveScore();}
    __save0();
    buildTable();buildStage();scoreHUD();
    if(TR.on)enterRow(TR.row);
    toast('table synced');
  }catch(e){toast('table sync failed');}
}

    document.querySelectorAll('#rLanes .rlane').forEach(el=>{
      el.classList.toggle('spk',el.dataset.pid===(m.spkPid||''));
      if(m.auds){const mb=el.querySelector('.rmute');if(mb){const on=!!m.auds[el.dataset.pid];

/* every take for a lane, PLAYING — tap one and it is pinned to this row for real */
function buildTakes(strip,pid,row){
  strip.innerHTML='';
  const lane=LANES[pid]||[],cur=rowCell(pid,row);
  const rowObj=ensureRows()[row]||{cells:{}};
  const pinned=(pid in rowObj.cells)?rowObj.cells[pid]:null;
  const nameOf=(typeof PMAP!=='undefined'&&PMAP[pid]&&PMAP[pid].name)||(typeof P!=='undefined'&&P[pid]&&P[pid].name)||pid;
  lane.forEach((cid,idx)=>{
    const c=CLIP[cid];if(!c)return;
    const t=document.createElement('button');
    t.className='rtake'+(cur===cid?' cur':'')+(pinned===idx?' pinned':'');
    const th=document.createElement('span');th.className='rtth';
    const el=(function(c){const v=document.createElement('video');v.muted=true;v.loop=true;v.autoplay=true;v.playsInline=true;v.preload='metadata';v.src=c.src;return v;})(c);if(el)th.appendChild(el);
    const lb=document.createElement('span');lb.className='rtlb';lb.textContent=c.label;
    t.append(th,lb);
    t.onclick=()=>{
      pinCell(pid,row,idx);
      relaySend({t:'score',score:SCORE});
      buildTakes(strip,pid,row);remoteGrid._row=-99;
      toastR(nameOf+' \u2192 '+c.label+'  (row '+(row+1)+', set)');
    };
    strip.appendChild(t);
  });
  {const rb=document.createElement('button');rb.className='rtake rest'+(pinned===-1?' pinned':'');
    rb.innerHTML='<span class="rtth ac">REST</span><span class="rtlb">off this row</span>';
    rb.title='this lane leaves the mosaic for this row';
    rb.onclick=()=>{pinCell(pid,row,-1);relaySend({t:'score',score:SCORE});
      buildTakes(strip,pid,row);remoteGrid._row=-99;toastR(nameOf+' rests on row '+(row+1));};
    strip.appendChild(rb);}
  if(pinned!=null){
    const a=document.createElement('button');a.className='rtake auto';
    a.innerHTML='<span class="rtth ac">AUTO</span><span class="rtlb">follow score order</span>';
    a.onclick=()=>{unpinCell(pid,row);relaySend({t:'score',score:SCORE});
      buildTakes(strip,pid,row);toastR('row '+(row+1)+' back to score order');};
    strip.appendChild(a);
  }
}
function toastR(msg){
  let t=document.getElementById('rtoast');
  if(!t){t=document.createElement('div');t.id='rtoast';document.body.appendChild(t);}
  t.textContent=msg;t.classList.add('on');clearTimeout(toastR._t);
  toastR._t=setTimeout(()=>t.classList.remove('on'),1600);
}
function remoteGrid(){
  if(!IS_REMOTE)return;
  const m=remoteState._m||{row:-1,n:scoreRows(),auds:null,spkPid:null};
  remoteGrid._row=m.row;remoteGrid._n=scoreRows()||m.n;
  const chips=document.getElementById('rChips'),lanesEl=document.getElementById('rLanes');
  if(!chips||!lanesEl)return;
  const n=scoreRows();
  chips.innerHTML='';
  for(let r=0;r<n;r++){
    const spk=rowSpeaker(r),pp=spk?(P[spk]||{}):null;
    const b=document.createElement('button');b.className='rc'+(r===m.row?' cur':'')+(remoteGrid._sel===r?' sel':'');
    b.innerHTML='<b>'+(r+1)+'</b><span class="ri">'+(pp&&pp.initials?pp.initials:'·')+'</span>'+'<span class="rdu">'+rowDurOf(r)+'s</span>';
    b.title=(pp&&pp.name?pp.name+' speaks':'empty')+' — tap: select · badge: speaker · time: duration';
    b.onclick=e=>{
      if(e.target.classList.contains('ri')){
        const ids=AI.filter(p=>rowCell(p.id,r)).map(p=>p.id);if(!ids.length)return;
        const cur=rowSpeaker(r),i=ids.indexOf(cur);SCORE.spk[r]=ids[(i+1)%ids.length];
        relaySend({t:'score',score:SCORE});remoteGrid();
      }else if(e.target.classList.contains('rdu')){cycleDur(r);remoteGrid();      }else{remoteGrid._sel=(remoteGrid._sel===r?null:r);remoteGrid();}
    };
    chips.appendChild(b);
  }
  lanesEl.innerHTML='';
  const row=(remoteGrid._sel!=null&&remoteGrid._sel<n)?remoteGrid._sel:Math.max(0,m.row|0);
  AI.forEach(p=>{
    if(!(LANES[p.id]||[]).length)return;
    const cid=rowCell(p.id,row);
    const card=document.createElement('div');card.className='rlane'+(m.spkPid===p.id?' spk':'');
    card.dataset.pid=p.id;
    const th=document.createElement('div');th.className='rth';
    const c=cid?CLIP[cid]:null;
    if(c){const el=(function(c){const v=document.createElement('video');v.muted=true;v.playsInline=true;v.preload='metadata';v.src=c.src+'#t=0.5';return v;})(c);if(el)th.appendChild(el);}
    card.appendChild(th);
    const bx=document.createElement('div');bx.className='rbx';
    const nm=document.createElement('div');nm.className='rnm';nm.textContent=p.name;bx.appendChild(nm);
    const now=document.createElement('div');now.className='rmeta';
    now.textContent='now: '+(c?c.label:'—');bx.appendChild(now);
    const deckCid=n>1?rowCell(p.id,(row+1)%n):null;
    const deck=document.createElement('div');deck.className='rmeta deck';
    deck.textContent='deck: '+(deckCid&&CLIP[deckCid]?CLIP[deckCid].label:'—');bx.appendChild(deck);
    const ct=document.createElement('div');ct.className='rct';
    const bS=document.createElement('button');bS.textContent='SPEAK';bS.className='rspk';
    bS.onclick=()=>relaySend({t:'hear',pid:p.id});
    const bM=document.createElement('button');bM.className='rmute';
    const on=!!(m.auds&&m.auds[p.id]);bM.innerHTML=on?ICO_SPK:ICO_MUT;bM.classList.toggle('on',on);
    bM.title='mute / unmute this lane';bM.onclick=()=>relaySend({t:'aud',pid:p.id,on:!bM.classList.contains('on')});
    const nT=(LANES[p.id]||[]).length;
    const bN=document.createElement('button');bN.className='rtk';
    bN.innerHTML='TAKES <b>'+nT+'</b> ▾';
    bN.title='see every take for this lane and set one';
    ct.append(bS,bM,bN);bx.appendChild(ct);
    card.appendChild(bx);
    const wrap=document.createElement('div');wrap.className='rlwrap';
    wrap.appendChild(card);
    const strip=document.createElement('div');strip.className='rtakes';
    wrap.appendChild(strip);
    bN.onclick=()=>{
      const open=strip.classList.contains('open');
      document.querySelectorAll('.rtakes.open').forEach(s=>{s.classList.remove('open');s.innerHTML='';});
      document.querySelectorAll('.rtk.on').forEach(b=>b.classList.remove('on'));
      if(open)return;
      strip.classList.add('open');bN.classList.add('on');buildTakes(strip,p.id,row);
    };
    lanesEl.appendChild(wrap);
  });
}

   +'#bar button.ib{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;'
   +'min-width:48px;padding:4px 7px!important;border-radius:8px;line-height:1}'
   +'#bar button.ib .ic{display:block;height:17px}'
   +'#bar button.ib svg{width:17px;height:17px;fill:currentColor;display:block}'
   +'#bar button.ib .lb{font-size:7px;letter-spacing:.07em;opacity:.8;white-space:nowrap}'
   +'#bar button.ib.go{color:var(--green);border-color:var(--green)}'
   +'#bar button.ib.go.on{color:var(--gold);border-color:var(--gold)}'
   +'#bar button.ib.red{color:var(--red);border-color:var(--red)}'
   +'#bar button.ib.hot{color:var(--hot);border-color:var(--hot)}'
   +'#bar .bgrp{display:flex;gap:3px;align-items:center;padding-right:5px;border-right:1px solid var(--line)}'
   +'#bar .bgrp:last-of-type{border-right:0}';
  document.head.appendChild(st);
  const grps=[0,1,2,3,4].map(()=>{const d=document.createElement('div');d.className='bgrp';return d;});
  Object.entries(BARDEF).forEach(([id,d])=>{
    const b=document.getElementById(id);if(!b)return;
    b.classList.add('ib');if(d.c)b.classList.add(d.c);
    b.innerHTML='<span class="ic">'+I[d.i]+'</span><span class="lb">'+d.l+'</span>';
    const ic=b.querySelector('.ic'),lb=b.querySelector('.lb');
    Object.defineProperty(b,'textContent',{configurable:true,
      get(){return lb.textContent;},
      set(v){const s=String(v);
        lb.textContent=s.replace(/[\u25b6\u2759\u25cf\u22ef]/g,'').trim()||d.l;
        if(d.alt)ic.innerHTML=(d.altTest&&d.altTest.test(s))?I[d.alt]:I[d.i];}});
    grps[d.g].appendChild(b);
  });
  const dur=document.getElementById('rowDur');if(dur)grps[0].appendChild(dur);
  const srow=document.getElementById('srow');
  const stat=bar.querySelector('.stat');
  grps.filter(g=>g.children.length).forEach(g=>bar.insertBefore(g,stat||null));
  if(srow)bar.insertBefore(srow,stat||null);
}
iconBar();
/* ---- GO LIVE: the puppet shows no strings, but the director isn't stranded ----
   What matters live: hold/resume, step a row, the camera, get out. One strip,
   invisible until the mouse peeks the top edge — a screen-share sees a Zoom call. */
(function stageStrip(){
  if(IS_REMOTE)return;
  const st=document.getElementById('stage');if(!st)return;
  const cs=document.createElement('style');cs.textContent=
    '#shide,#exitStage{display:none!important}'
   +'#sstrip{position:absolute;top:44px;left:50%;transform:translateX(-50%);z-index:60;display:flex;gap:4px;'
   +'background:rgba(10,10,12,.92);border:1px solid rgba(242,242,238,.22);border-radius:12px;padding:5px;'
   +'opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(10px)}'
   +'#stage.peek #sstrip{opacity:1;pointer-events:auto}'
   +'#sstrip button{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:50px;padding:6px 5px;'
   +'border:0;border-radius:9px;background:transparent;color:#f2f2ee;font:inherit;font-size:7px;'
   +'letter-spacing:.07em;cursor:pointer;line-height:1}'
   +'#sstrip button:hover{background:rgba(255,255,255,.1)}'
   +'#sstrip button svg{width:17px;height:17px;fill:currentColor;display:block}'
   +'#sstrip .go{color:var(--green)}#sstrip .go.on{color:var(--gold)}#sstrip .ex{color:var(--red)}';
  document.head.appendChild(cs);
  const strip=document.createElement('div');strip.id='sstrip';
  const mk=(icon,label,cls,fn)=>{const b=document.createElement('button');if(cls)b.className=cls;
    b.innerHTML='<span class="ic">'+icon+'</span><span class="lb">'+label+'</span>';b.onclick=fn;return b;};
  const bGo=mk(I.play,'GO','go',()=>{TR.on?trHold():trGo();});
  const bPv=mk(I.prev,'PREV',null,()=>trJump(Math.max(0,TR.row-1)));
  const bNx=mk(I.seq,'NEXT',null,()=>trJump(Math.min(scoreRows()-1,(TR.row<0?0:TR.row+1))));
  const bCam=mk(I.cam,'CAMERA',null,()=>{const c=document.getElementById('camBtn');if(c)c.click();});
  const bEx=mk(I.exit,'EXIT','ex',()=>{if(typeof exitStage==='function')exitStage();});
  strip.append(bGo,bPv,bNx,bCam,bEx);st.appendChild(strip);
  setInterval(()=>{if(!st.classList.contains('on'))return;
    const on=!!TR.on;bGo.classList.toggle('on',on);
    bGo.querySelector('.ic').innerHTML=on?I.pause:I.play;
    bGo.querySelector('.lb').textContent=on?'HOLD':'GO';},400);
  st.addEventListener('mousemove',e=>st.classList.toggle('peek',e.clientY<90));
  if(document.getElementById('sdock')&&typeof enterStage==='function'){
    const __es1=enterStage;enterStage=function(){__es1();
      const d=document.getElementById('sdock');if(d)d.classList.add('hidden');
      const cb=document.getElementById('sChat');if(cb)cb.classList.remove('on');};
  }
})();


window.SCOREAPI={SCORE,TR,trGo,trHold,trJump,scoreRows,rowSpeaker,enterRow};   // console/testing handle
})();
