<title>Scene Zero — MONTE Template</title>
<!--
  SCENE ZERO + SCORE. The table is the score: each lane's clips in order are its
  column, row r = each lane's r-th clip. A wall-clock TRANSPORT plays the score
  row by row (default 10s each) — every lane hard-cuts together at the boundary,
  one lane SPEAKS per row (rotating unless overridden), the rest react muted.
  It works standalone: ▶ SCORE just plays. The DIRECTOR window (same file,
  ?director=1, BroadcastChannel) makes it easy: edit lanes, cue rows, see NOW/
  NEXT — but nothing requires it. clips/manifest.json auto-seeds the cast.
-->
<style>
  :root{--bg:#0a0a0c;--ink:#f2f2ee;--dim:rgba(242,242,238,.5);--line:rgba(242,242,238,.2);
    --hot:#9fe7ff;--green:#43c463;--red:#e8402f;--gold:#f1c40f;--accent:#2d8cff;--tile:#141417}
  *{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
  html,body{height:100%;background:var(--bg);color:var(--ink);
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;overflow:hidden}
  button{font-family:inherit}
  #app{position:fixed;inset:0;display:flex;flex-direction:column}

  /* ===================== TOP BAR ===================== */
  #bar{display:flex;gap:6px;align-items:center;padding:7px 10px;border-bottom:1px solid var(--line);
    font-size:11px;flex-wrap:wrap;flex:0 0 auto}
  #bar b{font-size:12px;letter-spacing:.12em;margin-right:2px}
  #bar button{border:1px solid var(--line);border-radius:8px;background:transparent;color:var(--ink);
    font:inherit;font-size:10px;font-weight:700;padding:7px 11px;cursor:pointer;letter-spacing:.04em}
  #bar button.on{border-color:var(--hot);color:var(--hot)}
  #golive{background:var(--red);border-color:var(--red);color:#fff}
  #scoreGo{background:var(--green);border-color:var(--green);color:#000}
  #scoreGo.on{background:var(--gold);border-color:var(--gold);color:#000}
  #bar .stat{flex:1;text-align:center;color:var(--dim);font-size:10px;white-space:nowrap;overflow:hidden}
  #bar input[type=number]{width:44px;background:#101014;border:1px solid var(--line);border-radius:6px;
    color:var(--ink);font:inherit;font-size:10px;padding:5px 4px;text-align:center}
  #srow{color:var(--hot);font-size:10px;font-weight:700;letter-spacing:.06em;min-width:120px;text-align:right}

  #scenes{display:flex;gap:6px;padding:8px 10px;border-bottom:1px solid var(--line);overflow-x:auto;flex:0 0 auto}
  #scenes:empty{display:none}
  #scenes button{flex:0 0 auto;border:1px solid var(--line);border-radius:9px;background:#101014;
    color:#dcdce0;font:inherit;font-size:11px;font-weight:700;padding:9px 12px;cursor:pointer;
    display:flex;flex-direction:column;gap:2px;min-width:112px;text-align:left;letter-spacing:.02em}
  #scenes button small{font-size:8.5px;color:var(--dim);font-weight:400;letter-spacing:0}
  #scenes button.on{background:var(--hot);border-color:var(--hot);color:#000}
  #scenes button.on small{color:rgba(0,0,0,.6)}

  /* ===================== SCORE STRIP ===================== */
  #score{display:flex;gap:4px;padding:7px 10px;border-bottom:1px solid var(--line);overflow-x:auto;flex:0 0 auto;align-items:center}
  #score:empty{display:none}
  #score .lbl{font-size:9px;color:var(--dim);letter-spacing:.1em;flex:0 0 auto;margin-right:2px}
  .rowchip{flex:0 0 auto;display:flex;align-items:center;gap:5px;border:1px solid var(--line);border-radius:7px;
    background:#101014;padding:5px 8px;cursor:pointer;font-size:10px}
  .rowchip b{color:var(--dim);font-size:9px}
  .rowchip .sb{width:16px;height:16px;border-radius:50%;display:grid;place-items:center;font-size:8px;font-weight:800;color:#fff}
  .rowchip.cur{border-color:var(--hot);box-shadow:0 0 8px rgba(159,231,255,.35)}
  .rowchip.cur b{color:var(--hot)}
  .rowchip:hover{border-color:var(--hot)}

  /* ===================== TABLE VIEW ===================== */
  #table{flex:1 1 auto;min-height:0;display:flex;gap:8px;padding:8px;overflow-x:auto}
  .chan{flex:0 0 216px;display:flex;flex-direction:column;border:1px solid var(--line);border-radius:11px;
    overflow:hidden;background:var(--felt,#000)}
  .chan.live{border-color:var(--hot);box-shadow:0 0 0 1px var(--hot)}
  .chan.off{opacity:.45}
  .chan.dragover{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold)}
  .chd{display:flex;align-items:center;gap:7px;padding:8px 9px;border-bottom:1px solid var(--line);background:rgba(10,10,12,.9)}
  .chd .dot{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:700;color:#fff;flex:0 0 auto}
  .chd .nm{font-size:12px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chd .liveflag{font-size:8px;padding:2px 5px;border-radius:4px;background:var(--hot);color:#000;font-weight:800;display:none}
  .chan.live .liveflag{display:block}
  .chd .hbtn{border:1px solid var(--line);border-radius:5px;background:transparent;color:var(--dim);font-size:9px;padding:3px 6px;cursor:pointer}
  .chd .hbtn:hover{border-color:var(--hot);color:var(--hot)}

  .aud{display:flex;align-items:center;gap:6px;padding:7px 9px;border-bottom:1px solid var(--line);background:#0c0c0e;font-size:9px;color:var(--dim)}
  .aud button{border:1px solid var(--line);border-radius:6px;background:transparent;color:var(--ink);font:inherit;font-size:9px;font-weight:700;padding:4px 7px;cursor:pointer;flex:0 0 auto}
  .aud button.on{border-color:var(--green);color:var(--green)}
  .aud button.solo.on{border-color:var(--gold);color:var(--gold)}
  .aud input[type=range]{flex:1;height:16px;min-width:36px}
  .aud .vopill{font-size:8px;border:1px solid var(--line);border-radius:5px;padding:3px 5px;cursor:pointer}
  .aud .vopill.set{border-color:var(--hot);color:var(--hot)}

  .clips{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:5px;scrollbar-width:thin}
  .clip{position:relative;border:1px solid var(--line);border-radius:7px;overflow:hidden;cursor:grab;background:#111;height:74px;flex:0 0 auto;touch-action:none}
  .clip video,.clip img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.92;pointer-events:none}
  .clip .lb{position:absolute;left:5px;bottom:3px;font-size:9px;font-weight:700;color:#fff;text-shadow:0 1px 3px #000;z-index:2;pointer-events:none}
  .clip .num{position:absolute;left:4px;top:3px;font-size:8px;color:#000;background:var(--hot);padding:0 4px;border-radius:3px;font-weight:800;z-index:2;pointer-events:none}
  .clip .x{position:absolute;top:2px;right:2px;z-index:3;border:none;border-radius:4px;background:rgba(180,0,0,.85);color:#fff;font-size:9px;font-weight:800;padding:1px 5px;cursor:pointer;display:none}
  .clip:hover .x{display:block}
  .clip .csnd{position:absolute;top:2px;left:2px;z-index:3;width:20px;height:20px;border-radius:5px;border:1px solid rgba(255,255,255,.25);background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0}
  .clip .csnd svg{width:12px;height:12px;fill:#fff}
  .clip .csnd.on{background:var(--hot);border-color:var(--hot)}.clip .csnd.on svg{fill:#000}
  .clip.hearing{border-color:var(--hot);box-shadow:0 0 10px rgba(159,231,255,.5)}
  .clip.playing{border-color:var(--green);box-shadow:0 0 10px rgba(67,196,99,.4)}
  .clip.playing .lb::after{content:' ● LIVE';color:var(--green)}
  .clip.lifting{opacity:.35;outline:2px dashed var(--hot)}
  .clip .scrub{position:absolute;left:0;bottom:0;height:2px;background:var(--hot);width:0;z-index:2;pointer-events:none}
  .addclip{border:1px dashed var(--line);border-radius:7px;height:38px;display:flex;align-items:center;justify-content:center;gap:6px;color:var(--dim);font-size:10px;font-weight:700;cursor:pointer;flex:0 0 auto}
  .addclip:hover{border-color:var(--hot);color:var(--hot)}

  .cfoot{display:flex;gap:4px;padding:6px;border-top:1px solid var(--line)}
  .cfoot button{flex:1;border:1px solid var(--line);border-radius:6px;background:transparent;color:#aaa;font:inherit;font-size:9px;font-weight:700;padding:6px 3px;cursor:pointer}
  .cfoot button.on{background:var(--hot);color:#000;border-color:var(--hot)}
  .cfoot button.on.red{background:var(--red);color:#fff;border-color:var(--red)}
  .cfoot button.play{border-color:var(--gold);color:var(--gold)}

  #ghost{position:fixed;z-index:70;width:88px;height:56px;border:1px solid var(--hot);border-radius:6px;overflow:hidden;pointer-events:none;display:none;box-shadow:0 6px 20px rgba(0,0,0,.8)}
  #ghost img{width:100%;height:100%;object-fit:cover}
  #dropline{position:fixed;z-index:65;height:3px;background:var(--hot);display:none;pointer-events:none;border-radius:2px;box-shadow:0 0 8px var(--hot)}

  #loupe{position:fixed;z-index:80;width:340px;background:#0d0d10;border:1px solid var(--hot);border-radius:10px;overflow:hidden;display:none;box-shadow:0 16px 50px rgba(0,0,0,.85)}
  #loupe video{width:100%;aspect-ratio:16/9;object-fit:cover;background:#000;display:block;cursor:pointer}
  #loupe .lp{padding:8px 10px;font-size:11px}#loupe .lp b{color:var(--hot)}
  #loupe .lb2{display:flex;gap:5px;padding:0 8px 8px;flex-wrap:wrap}
  #loupe .lb2 button{flex:1 0 auto;border:1px solid var(--line);border-radius:6px;background:transparent;color:var(--ink);font:inherit;font-size:9px;font-weight:700;padding:6px;cursor:pointer}
  #loupe .lb2 button:hover{border-color:var(--hot);color:var(--hot)}
  @media(pointer:coarse){#loupe{left:0!important;right:0!important;bottom:0!important;top:auto!important;width:100%!important;border-radius:14px 14px 0 0}}

  /* ===================== THEATRE (per-lane reel) ===================== */
  #theatre{position:fixed;inset:0;z-index:200;background:#000;display:none}
  #theatre.on{display:block}
  #theatre>video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}
  #thHud{position:absolute;top:12px;left:14px;font-size:11px;color:rgba(255,255,255,.7);text-shadow:0 1px 2px #000}
  #thX{position:absolute;top:10px;right:12px;z-index:2;border:1px solid rgba(255,255,255,.4);border-radius:7px;background:rgba(0,0,0,.55);color:#fff;font:inherit;font-size:11px;font-weight:700;padding:7px 13px;cursor:pointer}
  #thRail{position:absolute;left:10px;right:10px;bottom:56px;z-index:3;display:flex;gap:3px;height:30px}
  .thSeg{flex:1;border:1px solid rgba(255,255,255,.16);border-radius:5px;background:rgba(255,255,255,.04);position:relative;overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .thSeg .fill{position:absolute;left:0;top:0;bottom:0;width:0;background:rgba(159,231,255,.25)}
  .thSeg .lb{font-size:8px;color:rgba(255,255,255,.7);z-index:2;padding:0 4px;white-space:nowrap;overflow:hidden}
  .thSeg.cur{border-color:var(--hot)}.thSeg.done .fill{width:100%}
  #thCtl{position:absolute;left:50%;bottom:12px;transform:translateX(-50%);display:flex;gap:7px;z-index:3}
  #thCtl button{border:1px solid rgba(255,255,255,.35);border-radius:8px;background:rgba(0,0,0,.6);color:#fff;font:inherit;font-size:12px;font-weight:700;padding:8px 14px;cursor:pointer}

  /* ===================== STAGE VIEW (recordable Zoom) ===================== */
  #stage{position:fixed;inset:0;z-index:150;background:#0b0b0d;display:none;flex-direction:column}
  #stage.on{display:flex}
  .stop{height:36px;background:#161619;display:flex;align-items:center;justify-content:space-between;padding:0 12px;font-size:12px;color:var(--dim);flex:0 0 auto;border-bottom:1px solid #000}
  .srec{display:flex;gap:6px;align-items:center;color:#e5e5e8}
  .srec .dot{width:9px;height:9px;border-radius:50%;background:var(--red);animation:blink 1.5s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
  #stageRow{color:#9a9aa2;font-size:11px}
  .spill{background:#2a2a30;border-radius:5px;padding:3px 9px;font-size:11px;color:#d8d8dc}
  #sgrid{flex:1 1 auto;display:grid;gap:4px;padding:5px;grid-template-columns:1fr 1fr;grid-auto-rows:1fr;background:#0b0b0d}
  .stile{position:relative;background:var(--tile);overflow:hidden;outline:0 solid var(--accent);transition:outline-width .1s}
  .stile.spk{z-index:2}
  .stile video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#0e0e11;opacity:0;transition:opacity .1s}
  .stile video.on{opacity:1}
  .stile.mir video.live{transform:scaleX(-1)}
  .sph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 42%,#22222c,#0e0e12);z-index:1}
  .sph .av{width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:600;color:#fff}
  .stile.has .sph{display:none}
  .snm{position:absolute;left:7px;bottom:7px;background:rgba(0,0,0,.55);padding:2px 8px;border-radius:4px;font-size:12px;font-weight:500;display:flex;gap:5px;align-items:center;z-index:3;color:#fff}
  .snm .h{font-size:8px;background:var(--accent);color:#fff;padding:1px 4px;border-radius:3px;text-transform:uppercase}
  .snm.mut::before{content:'🔇';font-size:11px}
  .sgl{position:absolute;inset:0;z-index:4;pointer-events:none;opacity:0}
  .stile.gl .sgl{opacity:1;background:repeating-linear-gradient(0deg,rgba(45,140,255,.18) 0 2px,transparent 2px 4px),#05070d;animation:gf .15s steps(2) infinite}
  @keyframes gf{0%{transform:translateX(0);opacity:.9}50%{transform:translateX(3px);opacity:.4}100%{transform:translateX(-2px)}}
  .stile.gl video,.stile.gl .sph{filter:hue-rotate(35deg) contrast(1.3) saturate(0)}
  #stoast{position:absolute;top:48px;right:14px;z-index:20;background:#26262b;border:1px solid #34343a;border-radius:10px;padding:12px 14px;width:270px;box-shadow:0 12px 40px rgba(0,0,0,.6);display:none}
  #stoast.on{display:block}
  #stoast .a{font-size:12px;font-weight:600;color:#fff;margin-bottom:3px}#stoast .b{font-size:11px;color:var(--dim)}
  .sbot{height:52px;background:#1b1b1f;display:flex;align-items:center;justify-content:center;gap:16px;flex:0 0 auto;border-top:1px solid #000;position:relative}
  .sc{display:flex;flex-direction:column;align-items:center;gap:2px;color:#f3f3f5;font-size:9px}
  .sc svg{width:20px;height:20px;fill:currentColor}.sc span{color:#9a9aa2}
  .sc.leave .lp{background:var(--red);color:#fff;padding:6px 13px;border-radius:6px;font-size:12px;font-weight:600}
  #sdock{position:absolute;left:0;right:0;bottom:52px;z-index:30;background:rgba(9,9,11,.94);border-top:1px solid #2a2a30;padding:8px 10px;display:flex;gap:6px;overflow-x:auto;backdrop-filter:blur(8px)}
  #sdock.hidden{display:none}
  #sdock .sc-scene{flex:0 0 auto;border:1px solid var(--line);border-radius:8px;background:#141418;color:#dcdce0;font:inherit;font-size:10px;font-weight:700;padding:7px 10px;cursor:pointer}
  #sdock .sc-scene.on{background:var(--hot);border-color:var(--hot);color:#000}
  #sdock .grp{display:flex;gap:4px;flex:0 0 auto;border-left:1px solid var(--line);padding-left:6px;margin-left:2px}
  #sdock .grp .gp{font-size:8px;color:var(--dim);align-self:center;margin-right:2px}
  #sdock .grp button{border:1px solid var(--line);border-radius:6px;background:#0e0e12;color:#bbb;font:inherit;font-size:9px;font-weight:700;padding:5px 7px;cursor:pointer}
  #sdock .grp button.on{background:var(--hot);color:#000;border-color:var(--hot)}
  #shide{position:absolute;top:44px;left:12px;z-index:31;border:1px solid var(--line);border-radius:7px;background:rgba(0,0,0,.5);color:#fff;font:inherit;font-size:10px;font-weight:700;padding:6px 10px;cursor:pointer;display:none}
  #exitStage{position:absolute;top:44px;right:12px;z-index:31;border:1px solid var(--hot);border-radius:7px;background:rgba(0,0,0,.5);color:var(--hot);font:inherit;font-size:10px;font-weight:700;padding:6px 12px;cursor:pointer}
  #shide,#exitStage,#sdock,.sbot{transition:opacity .3s}
  #exitStage{opacity:0;pointer-events:none}
  #stage.peek #exitStage{opacity:1;pointer-events:auto}
  #stage.idle #sdock,#stage.idle .sbot{opacity:0;pointer-events:none}
  .sbot .sc{cursor:pointer}
  .sbot .sc.on svg{fill:var(--hot)}.sbot .sc.on span{color:var(--hot)}
  .stile.hear{outline:3px solid var(--accent);outline-offset:-3px;z-index:2}
  .tctl{position:absolute;bottom:8px;right:8px;z-index:6;display:flex;gap:6px;opacity:0;transition:opacity .18s}
  .stile:hover .tctl{opacity:1}
  #stage.idle .tctl{opacity:0!important;pointer-events:none}
  .tctl button{width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.62);border:1px solid rgba(255,255,255,.24);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;line-height:1}
  .tctl button:hover{background:rgba(0,0,0,.85)}
  .tctl button svg{width:15px;height:15px;fill:#fff}
  .tctl .tmute.on{background:var(--hot);border-color:var(--hot)}.tctl .tmute.on svg{fill:#000}
  .tctl .tmute.off svg{fill:#ff6a5d}

  /* ===================== DIRECTOR MODE ===================== */
  body.director #golive,body.director #camBtn,body.director #recBtn{display:none}
  body.director #bar{border-bottom:2px solid var(--gold)}
  #dirhud{display:none;padding:10px;border-bottom:1px solid var(--line);gap:16px;align-items:center;flex:0 0 auto}
  body.director #dirhud{display:flex}
  #dirhud .big{font-size:26px;font-weight:800;color:var(--hot);letter-spacing:.04em;min-width:150px}
  #dirhud .nx{font-size:12px;color:var(--dim)}
  #dirhud .nx b{color:var(--ink)}
  #dirhud .cd{font-size:26px;font-weight:800;color:var(--gold);min-width:70px;text-align:right}
  #dirhud .lk{font-size:9px;color:var(--dim);margin-left:auto;text-align:right}
  #dirhud .lk.ok{color:var(--green)}

  input[type=file]{display:none}
  .toast{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);z-index:210;background:#141418;border:1px solid var(--hot);border-radius:8px;padding:8px 14px;font-size:11px;color:var(--hot);display:none;box-shadow:0 8px 30px rgba(0,0,0,.6)}
  .toast.on{display:block}
</style>

        return c - 0x61 + 26;
      } else if (0x30 <= c && c <= 0x39) {
        return c - 0x30 + 52;
      } else if (c == 0x2b) {

      } else if (c == 0x2f) {

  //---------------------------------------------------------------------
  // gifImage (B/W)
  //---------------------------------------------------------------------

  var gifImage = function(width, height) {

      // GIF Signature

      // Screen Descriptor

      out.writeShort(_width);
      out.writeShort(_height);

      out.writeByte(0x80); // 2bit
      out.writeByte(0);
      out.writeByte(0);

      //---------------------------------
      // Global Color Map

      // black
      out.writeByte(0x00);
      out.writeByte(0x00);
      out.writeByte(0x00);

      // white
      out.writeByte(0xff);
      out.writeByte(0xff);
      out.writeByte(0xff);

      // Image Descriptor

      out.writeString(',');
      out.writeShort(0);
      out.writeShort(0);

      out.writeShort(_height);
      out.writeByte(0);

      // Local Color Map

      // Raster Data

        } else {

<body>
<div id="app">
  <div id="bar">
    <b>SCENE ZERO · MONTE</b>
    <button id="scoreGo" title="play the score — rows advance on the clock, one speaker per row">▶ SCORE</button>
    <input type="number" id="rowDur" min="2" max="60" step="1" value="10" title="seconds per row">
    <button id="dirBtn" title="open the director window — cue rows, see NOW/NEXT (optional; everything works without it)">DIRECTOR</button>
    <button id="golive" title="flip into the recordable Zoom stage (free mosaic, no score)">● GO LIVE</button>
    <button id="camBtn" title="add the actress camera">CAMERA</button>
    <button id="theatreAll" title="play the whole table in sequence">THEATRE</button>
    <button id="masterAud" class="on">AUDIO ON</button>
    <button id="addLane" title="add & name a new participant lane — build any grid">+ LANE</button>
    <button id="saveScene" title="save the current call as a reusable scene">SAVE SCENE</button>
    <button id="recBtn" title="record this call to a file for redoing takes">REC</button>
    <button id="exportBtn">EXPORT</button>
    <button id="importBtn">IMPORT</button>
    <input type="file" id="importFile" accept=".json">
    <span class="stat" id="stat">empty template — add lanes, drop clips or cameras, build any Zoom call</span>
    <span id="srow"></span>
  </div>
  <div id="dirhud"><span class="big" id="dNow">—</span><span class="cd" id="dCd"></span>
    <span class="nx" id="dNext"></span><span class="lk" id="dLink">stage: not detected — open the stage page in another window</span></div>
  <div id="scenes"></div>
  <div id="score"></div>
  <div id="table"></div>
</div>

<div id="ghost"><img></div>
<div id="dropline"></div>
<div id="loupe"></div>
<div class="toast" id="toast"></div>

<!-- THEATRE -->
<div id="theatre">
  <video id="thv" playsinline></video>
  <div id="thHud"></div><button id="thX">EXIT</button>
  <div id="thRail"></div>
  <div id="thCtl"><button data-c="prev">&#9664;&#9664;</button><button data-c="pp">&#9646;&#9646;</button><button data-c="next">&#9654;&#9654;</button></div>
</div>

<!-- STAGE (recordable) -->
<div id="stage">
  <div class="stop">
    <span class="srec"><span class="dot"></span>Recording…</span>
    <span id="stageRow"></span>
    <span id="sview">Gallery View</span>
  </div>
  <button id="shide" style="display:none">HIDE CONTROLS (H)</button>
  <button id="exitStage" style="display:none">EXIT STAGE</button>
  <div id="sgrid"></div>
  <div id="stoast"><div class="a">Important meeting starting NOW</div><div class="b">Performance Review · Phil</div></div>
  <div id="sdock"></div>
  <div class="sbot">
    <div class="sc" id="sMute"><svg viewBox="0 0 24 24"><path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21H8v2h8v-2h-3v-2.08A7 7 0 0 0 19 12z"/></svg><span>Mute</span></div>
    <div class="sc" id="sVideo"><svg viewBox="0 0 24 24"><path d="M17 10.5V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3.5l4 4v-11z"/></svg><span>Start Video</span></div>
    <div class="sc"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 3-1.34 3-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5C15 14.17 10.33 13 8 13z"/></svg><span>Participants</span></div>
    <div class="sc" id="sChat" title="show / hide the MONTE director controls"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg><span>Chat</span></div>
    <div class="sc leave" id="sLeave"><span class="lp">Leave</span></div>
  </div>
</div>

<script>
"use strict";
/* ============ CAST ============ */
const PEOPLE=[
  {id:'nat',  name:'You',      hue:0,  initials:'Y',live:true,host:true},
];
const P={};PEOPLE.forEach(p=>P[p.id]=p);
const AI=[];   // non-host lanes; filled by manifest / saved table / prompts
const hsl=(h,s,l)=>`hsl(${h} ${s}% ${l}%)`;
let laneHue=200,laneSeq=0;
function addLaneRaw(name){
  laneHue=(laneHue+53)%360;
  const id='p'+(++laneSeq)+'_'+Date.now().toString(36);   // monotonic — Date.now()+random collides in-loop
  const p={id,name,hue:laneHue,initials:(name||'?').trim().slice(0,1).toUpperCase()};
  PEOPLE.push(p);P[id]=p;AI.push(p);
  ST.aud[id]={on:false,vol:1,solo:false,vo:null};ST.flags[id]={spk:false,mut:false,gl:false};
  LANES[id]=[];return id;
}

/* ============ CLIPS ============ */
const DIR='scene6-stage/clips/';
let CLIP={},LANES={},cCounter=0;
function regClip(o){const id='c'+(cCounter++);CLIP[id]={id,...o};return id;}
const SAVEKEY='sceneZeroTable';
function saveTable(){const clips={};Object.values(CLIP).forEach(c=>{if(c.file)clips[c.id]={label:c.label,file:c.file};});
  const lanes={};AI.forEach(p=>lanes[p.id]=LANES[p.id].filter(id=>CLIP[id]&&CLIP[id].file));
  const people=AI.map(p=>({id:p.id,name:p.name,hue:p.hue,initials:p.initials}));
  try{localStorage.setItem(SAVEKEY,JSON.stringify({people,clips,lanes,cCounter,laneSeq}));}catch(e){}
}
function loadTable(){try{const s=JSON.parse(localStorage.getItem(SAVEKEY)||'null');if(!s||!s.clips||!s.people||!s.people.length)return false;
  CLIP={};LANES={};AI.length=0;PEOPLE.length=1;cCounter=s.cCounter||0;laneSeq=s.laneSeq||99;
  Object.keys(P).forEach(k=>{if(k!=='nat')delete P[k];});
  s.people.forEach(pp=>{const p={id:pp.id,name:pp.name,hue:pp.hue,initials:pp.initials};
    PEOPLE.push(p);P[p.id]=p;AI.push(p);
    ST.aud[p.id]={on:false,vol:1,solo:false,vo:null};ST.flags[p.id]={spk:false,mut:false,gl:false};LANES[p.id]=[];});
  Object.entries(s.clips).forEach(([id,c])=>CLIP[id]={id,label:c.label,file:c.file,src:DIR+encodeURIComponent(c.file)});
  AI.forEach(p=>LANES[p.id]=(s.lanes[p.id]||[]).filter(id=>CLIP[id]));return true;}catch(e){return false;}}

/* clips/manifest.json -> the default cast. [{file,lane,label}] */
async function seedManifest(){
  try{const r=await fetch(DIR+'manifest.json');if(!r.ok)return false;const man=await r.json();
    if(!Array.isArray(man)||!man.length)return false;
    const groups={};man.forEach(m=>{(groups[m.lane]=groups[m.lane]||[]).push(m);});
    Object.entries(groups).forEach(([name,items])=>{
      const id=addLaneRaw(name);
      items.forEach(m=>{const cid=regClip({label:(m.label||m.file).slice(0,16),file:m.file,src:DIR+encodeURIComponent(m.file)});LANES[id].push(cid);});});
    saveTable();return true;
  }catch(e){return false;}
}

/* ============ SCENES ============ */
const SCENES={};
const SORDER=Object.keys(SCENES);

/* ============ STATE ============ */
const ST={live:{},aud:{},scene:null,master:true,inStage:false,
  flags:{},
  onstage:new Set(),
};
PEOPLE.forEach(p=>{ST.aud[p.id]={on:false,vol:1,solo:false,vo:null};ST.flags[p.id]={spk:false,mut:false,gl:false};});

const stageVids={};
let liveStream=null;

/* ============ toast ============ */
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),1400);}

/* ============ TABLE ============ */
const table=document.getElementById('table');
function buildTable(){
  table.innerHTML='';
  AI.forEach(p=>{
    const ch=document.createElement('div');ch.className='chan';ch.id='ch-'+p.id;ch.dataset.pid=p.id;
    ch.style.setProperty('--felt',hsl(p.hue,40,6));ch.style.borderColor=hsl(p.hue,35,22);
    const a=ST.aud[p.id];
    ch.innerHTML=`
      <div class="chd"><div class="dot" style="background:${hsl(p.hue,55,45)}">${p.initials}</div>
        <div class="nm" style="color:${hsl(p.hue,70,68)}">${p.name}</div>
        <span class="liveflag">LIVE</span>
        <button class="hbtn" data-a="ren" data-p="${p.id}" title="rename">✎</button>
        <button class="hbtn" data-a="del" data-p="${p.id}" title="close this lane">✕</button></div>
      <div class="aud">
        <button class="amute ${a.on?'on':''}" data-p="${p.id}">${a.on?'AUD':'mute'}</button>
        <button class="solo ${a.solo?'on':''}" data-p="${p.id}">solo</button>
        <input type="range" class="avol" data-p="${p.id}" min="0" max="100" value="${Math.round(a.vol*100)}">
        <span class="vopill ${a.vo?'set':''}" data-p="${p.id}">${a.vo?'VO✓':'+VO'}</span></div>
      <div class="clips" id="clips-${p.id}"></div>
      <div class="cfoot">
        <button class="fplay play" data-p="${p.id}">▶ LANE</button>
        <button class="fspk" data-p="${p.id}">Speak</button>
        <button class="fmut" data-p="${p.id}">Mute</button>
        <button class="fgl red" data-p="${p.id}">Glitch</button></div>`;
    table.appendChild(ch);
    renderLane(p.id);
    const vin=document.createElement('input');vin.type='file';vin.accept='audio/*';vin.dataset.p=p.id;vin.className='voin';ch.appendChild(vin);
  });
  wireControls();
  const total=Object.values(LANES).reduce((a,b)=>a+b.length,0);
  document.getElementById('stat').textContent=AI.length?
    `${AI.length} lanes · ${total} clips · score: ${scoreRows()} rows × ${SCORE.rowDur}s = ${scoreRows()*SCORE.rowDur}s`:
    'empty template — add lanes, drop clips or cameras, build any Zoom call';
  scoreHUD();
}
function renderLane(pid){
  const list=document.getElementById('clips-'+pid);if(!list)return;list.innerHTML='';
  LANES[pid].forEach((cid,i)=>{const c=CLIP[cid];if(!c)return;
    const el=document.createElement('div');el.className='clip'+(ST.live[pid]===cid?' playing':'');
    el.id='clip-'+cid;el.dataset.cid=cid;el.dataset.pid=pid;
    el.innerHTML=`<video muted preload="metadata" src="${c.src}#t=0.5"></video><button class="csnd" title="hear this clip"><svg viewBox="0 0 24 24"><path d="M3 10v4h4l5 5V5L7 10H3zm13.5 2A4.5 4.5 0 0 0 14 7.97v8.05A4.5 4.5 0 0 0 16.5 12zM14 3.23v2.06a7 7 0 0 1 0 13.42v2.06a9 9 0 0 0 0-17.54z"/></svg></button><div class="num">${i+1}</div><div class="lb">${c.label}</div><div class="scrub"></div><button class="x">✕</button>`;
    list.appendChild(el);});

function wireControls(){

function refreshAud(){AI.forEach(p=>{const a=ST.aud[p.id];const ch=document.getElementById('ch-'+p.id);if(!ch)return;

/* ============ clip interactions ============ */
let drag=null;
const ghost=document.getElementById('ghost'),dropline=document.getElementById('dropline');
function wireClips(pid){
  document.querySelectorAll('#clips-'+pid+' .clip').forEach(el=>{
    const cid=el.dataset.cid;
    el.addEventListener('pointermove',e=>{if(drag||el.classList.contains('hearing'))return;const v=el.querySelector('video');if(!v)return;
      const r=el.getBoundingClientRect();const frac=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
      if(v.readyState>=1&&v.duration){try{v.currentTime=frac*v.duration;}catch(_){}el.querySelector('.scrub').style.width=(frac*100)+'%';}});
    el.querySelector('.x').onclick=e=>{e.stopPropagation();removeClip(pid,cid);};
    el.querySelector('.csnd').onclick=e=>{e.stopPropagation();previewClipSound(el);};
    el.addEventListener('click',()=>{if(el._moved){el._moved=false;return;}
      if(IS_DIR){sendCue({t:'clip',pid,file:CLIP[cid].file});toast('cued '+CLIP[cid].label);return;}
      if(ST.live[pid]===cid) unLive(pid); else goLive(pid,cid);});
    el.addEventListener('dblclick',()=>openLoupe(pid,cid));
    el.addEventListener('pointerdown',e=>startDrag(e,pid,cid,el));
  });
}
function startDrag(e,pid,cid,el){if(e.target.classList.contains('x')||e.target.closest('.csnd'))return;drag={pid,cid,el,x:e.clientX,y:e.clientY,active:false};}
let hearingEl=null;
function previewClipSound(el){
  const v=el.querySelector('video'); if(!v)return;
  if(hearingEl && hearingEl!==el){const ov=hearingEl.querySelector('video');if(ov){ov.muted=true;ov.pause();}
    hearingEl.classList.remove('hearing');hearingEl.querySelector('.csnd')?.classList.remove('on');}
  if(el.classList.contains('hearing')){v.muted=true;v.pause();el.classList.remove('hearing');el.querySelector('.csnd').classList.remove('on');hearingEl=null;return;}
  v.muted=false;v.loop=true;try{v.currentTime=0;}catch(_){}v.play().catch(()=>{});
  el.classList.add('hearing');el.querySelector('.csnd').classList.add('on');hearingEl=el;
}
document.addEventListener('pointermove',e=>{
  if(!drag)return;
  if(!drag.active){if(Math.hypot(e.clientX-drag.x,e.clientY-drag.y)<6)return;drag.active=true;drag.el.classList.add('lifting');drag.el._moved=true;ghost.querySelector('img').src='';ghost.style.display='block';}
  ghost.style.left=(e.clientX+10)+'px';ghost.style.top=(e.clientY+10)+'px';
  const chEl=document.elementsFromPoint(e.clientX,e.clientY).find(x=>x.classList&&x.classList.contains('chan'));
  document.querySelectorAll('.chan.dragover').forEach(c=>c.classList.remove('dragover'));dropline.style.display='none';
  if(!chEl){drag.tgt=null;return;}chEl.classList.add('dragover');
  const tpid=chEl.dataset.pid;const els=[...chEl.querySelectorAll('.clip')];let idx=els.length;
  for(let i=0;i<els.length;i++){const r=els[i].getBoundingClientRect();if(e.clientY<r.top+r.height/2){idx=i;break;}}
  drag.tgt={pid:tpid,idx};
  const listEl=chEl.querySelector('.clips');let y;
  if(idx<els.length)y=els[idx].getBoundingClientRect().top;
  else if(els.length)y=els[els.length-1].getBoundingClientRect().bottom;
  else y=listEl.getBoundingClientRect().top+6;
  const lr=listEl.getBoundingClientRect();dropline.style.display='block';dropline.style.left=lr.left+6+'px';dropline.style.width=(lr.width-12)+'px';dropline.style.top=y+'px';
});
document.addEventListener('pointerup',()=>{
  if(!drag)return;const d=drag;drag=null;ghost.style.display='none';dropline.style.display='none';
  document.querySelectorAll('.chan.dragover').forEach(c=>c.classList.remove('dragover'));if(d.el)d.el.classList.remove('lifting');
  if(!d.active||!d.tgt)return;
  const from=LANES[d.pid];const fi=from.indexOf(d.cid);if(fi>=0)from.splice(fi,1);
  let idx=d.tgt.idx;const to=LANES[d.tgt.pid];if(d.pid===d.tgt.pid&&fi<idx)idx--;
  to.splice(Math.min(idx,to.length),0,d.cid);
  renderLane(d.pid);if(d.tgt.pid!==d.pid)renderLane(d.tgt.pid);saveTable();scoreHUD();
  toast(d.pid===d.tgt.pid?'reordered':('moved to '+P[d.tgt.pid].name));
});
function removeClip(pid,cid){LANES[pid]=LANES[pid].filter(x=>x!==cid);if(ST.live[pid]===cid)delete ST.live[pid];renderLane(pid);saveTable();scoreHUD();toast('removed');}

/* ============ loupe ============ */
const loupe=document.getElementById('loupe');
function openLoupe(pid,cid){const c=CLIP[cid];
  loupe.innerHTML=`<video src="${c.src}" autoplay loop playsinline></video><div class="lp"><b>${P[pid].name}</b> · ${c.label}</div>
    <div class="lb2"><button data-a="live">SET LIVE</button><button data-a="dl">DOWNLOAD</button><button data-a="close">CLOSE</button></div>`;
  loupe.style.display='block';if(!matchMedia('(pointer:coarse)').matches){loupe.style.left='calc(50% - 170px)';loupe.style.top='80px';}
  const v=loupe.querySelector('video');v.muted=false;v.onclick=()=>{v.paused?v.play():v.pause();};

function closeLoupe(){const v=loupe.querySelector('video');if(v)v.pause();loupe.style.display='none';}
document.addEventListener('pointerdown',e=>{if(loupe.style.display==='block'&&!e.target.closest('#loupe')&&!e.target.closest('.clip'))closeLoupe();},true);

/* ============ GO LIVE — set a character's clip; drives stage tile directly ============ */
function ensureStageVideo(pid,cid){
  const c=CLIP[cid];if(!c)return null;
  stageVids[pid]=stageVids[pid]||{};
  if(stageVids[pid][cid])return stageVids[pid][cid];
  const tile=document.getElementById('stile-'+pid);if(!tile)return null;
  const v=document.createElement('video');v.loop=true;v.muted=true;v.playsInline=true;v.preload='auto';v.src=c.src;
  tile.insertBefore(v,tile.querySelector('.sph'));
  stageVids[pid][cid]=v;return v;
}
function goLive(pid,cid){
  ST.live[pid]=cid;
  ST.onstage.add(pid);
  document.querySelectorAll('#clips-'+pid+' .clip').forEach(el=>el.classList.toggle('playing',el.dataset.cid===cid));
  document.getElementById('ch-'+pid)?.classList.add('live');
  if(ST.inStage){const t=document.getElementById('stile-'+pid);if(t)t.style.display='';refreshStageLayout();}
  ensureStageVideo(pid,cid);
  Object.entries(stageVids[pid]||{}).forEach(([id,v])=>{
    if(id===cid){v.classList.add('on');v.currentTime=0;v.play().catch(()=>{});document.getElementById('stile-'+pid)?.classList.add('has');}
    else{v.classList.remove('on');v.pause();}
  });
  applyAudio();
  if(!ST.inStage&&!TR.on)toast(P[pid].name+' → '+CLIP[cid].label);
}

/* ============ per-character audio ============ */
const audioEls={};
const SPK_ON='<svg viewBox="0 0 24 24"><path d="M3 10v4h4l5 5V5L7 10H3zm13.5 2A4.5 4.5 0 0 0 14 7.97v8.05A4.5 4.5 0 0 0 16.5 12zM14 3.23v2.06a7 7 0 0 1 0 13.42v2.06a9 9 0 0 0 0-17.54z"/></svg>';
const SPK_OFF='<svg viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45.05-.63zM19 12c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.8 8.8 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73 4.27 3zM12 4 9.91 6.09 12 8.18z"/></svg>';
function applyStageAudio(){
  PEOPLE.forEach(p=>{
    if(p.host) return;
    const cid=ST.live[p.id];
    Object.entries(stageVids[p.id]||{}).forEach(([id,v])=>{ v.muted = !(id===cid && ST.master && ST.aud[p.id].on); });
    refreshTileCtl(p.id);
  });
  Object.values(audioEls).forEach(a=>a.pause());
  if(typeof refreshHear==='function') refreshHear();
}
function refreshTileCtl(pid){
  const b=document.querySelector('#stile-'+pid+' .tmute'); if(!b) return;
  const on=ST.master && ST.aud[pid] && ST.aud[pid].on;
  b.classList.toggle('on',on); b.classList.toggle('off',!on);
  b.innerHTML = on ? SPK_ON : SPK_OFF;
}
function tileToggleAudio(pid){
  ST.aud[pid].on=!ST.aud[pid].on; if(ST.aud[pid].on)ST.master=true;
  applyStageAudio(); refreshAud();
}
function tileNextClip(pid){
  const lane=LANES[pid]||[]; if(lane.length<2){toast('only one clip');return;}
  const cur=lane.indexOf(ST.live[pid]); const next=lane[(cur+1)%lane.length];
  goLive(pid,next);
}
function applyAudio(){
  if(ST.inStage){ applyStageAudio(); return; }
  const anySolo=AI.some(p=>ST.aud[p.id].solo);
  AI.forEach(p=>{const a=ST.aud[p.id];const cid=ST.live[p.id];let el=audioEls[p.id];
    const wantSrc=a.vo||(cid?CLIP[cid].src:null);
    const shouldPlay=ST.master&&a.on&&wantSrc&&(!anySolo||a.solo);
    if(!shouldPlay){if(el)el.pause();return;}
    if(!el){el=new Audio();el.loop=true;audioEls[p.id]=el;}
    if(el.src!==wantSrc)el.src=wantSrc;el.volume=a.vol;el.play().catch(()=>{});
  });
  if(typeof refreshHear==='function') refreshHear();
}

/* ============ DIEGETIC STAGE: click-to-hear + free mosaic ============ */
function stageHear(pid){
  const already = ST.aud[pid] && ST.aud[pid].on && ST.aud[pid].solo;
  AI.forEach(p=>{ST.aud[p.id].on=false;ST.aud[p.id].solo=false;ST.flags[p.id].spk=false;});
  if(!already){ ST.aud[pid].on=true; ST.aud[pid].solo=true; ST.flags[pid].spk=true; }
  ST.master=true;
  applyAudio(); refreshHear();
  PEOPLE.forEach(p=>{const t=document.getElementById('stile-'+p.id);if(t)t.classList.toggle('spk',ST.flags[p.id].spk);});
  refreshFlags(); refreshDock(); refreshAud();
}
function refreshHear(){PEOPLE.forEach(p=>{const t=document.getElementById('stile-'+p.id);
  if(t)t.classList.toggle('hear', !!(ST.master&&ST.aud[p.id]&&ST.aud[p.id].on));});}
function showTile(pid){ST.onstage.add(pid);const t=document.getElementById('stile-'+pid);if(t)t.style.display='';refreshStageLayout();}
function removeFromStage(pid){ST.onstage.delete(pid);const t=document.getElementById('stile-'+pid);if(t)t.style.display='none';
  if(ST.aud[pid]){ST.aud[pid].on=false;ST.aud[pid].solo=false;applyAudio();refreshHear();}refreshStageLayout();}
function unLive(pid){
  delete ST.live[pid];
  document.querySelectorAll('#clips-'+pid+' .clip').forEach(el=>el.classList.remove('playing'));
  document.getElementById('ch-'+pid)?.classList.remove('live');
  Object.values(stageVids[pid]||{}).forEach(v=>{v.classList.remove('on');v.pause();});
  document.getElementById('stile-'+pid)?.classList.remove('has');
  removeFromStage(pid);
  if(!ST.inStage)toast(P[pid].name+' off');
}
function refreshStageLayout(){
  const on=PEOPLE.filter(p=>ST.onstage.has(p.id));
  const n=Math.max(1,on.length), cols=Math.ceil(Math.sqrt(n));
  const sgrid=document.getElementById('sgrid');if(sgrid)sgrid.style.gridTemplateColumns=`repeat(${cols},1fr)`;
  PEOPLE.forEach(p=>{const t=document.getElementById('stile-'+p.id);if(t)t.style.display=ST.onstage.has(p.id)?'':'none';});
}

/* ============ SCENES ============ */
function buildScenes(){const sc=document.getElementById('scenes');sc.innerHTML='';
  SORDER.forEach((k,i)=>{const s=SCENES[k];const b=document.createElement('button');b.dataset.k=k;
    b.innerHTML=`${i+1}. ${s.name}<small>${s.desc}</small>`;b.onclick=()=>applyScene(k);sc.appendChild(b);});}
function applyScene(key){
  const s=SCENES[key];if(!s)return;ST.scene=key;
  document.querySelectorAll('#scenes button,#sdock .sc-scene').forEach(b=>b.classList.toggle('on',b.dataset.k===key));
  AI.forEach(p=>document.getElementById('ch-'+p.id)?.classList.toggle('off',!s.stiles.includes(p.id)));
  ST.onstage=new Set(s.stiles);

  Object.entries(s.pick||{}).forEach(([pid,label])=>{const cid=LANES[pid].find(id=>CLIP[id].label===label)||LANES[pid][0];if(cid)goLive(pid,cid);});

function setFlag(pid,f,on,exclusiveSpk){
  ST.flags[pid][f]=on;
  if(exclusiveSpk&&on)PEOPLE.forEach(p=>{if(p.id!==pid){ST.flags[p.id].spk=false;}});
  PEOPLE.forEach(p=>{const t=document.getElementById('stile-'+p.id);if(!t)return;
    t.classList.toggle('spk',ST.flags[p.id].spk);
    t.classList.toggle('gl',ST.flags[p.id].gl);

/* ============ STAGE build ============ */
function buildStage(){
  const sgrid=document.getElementById('sgrid');sgrid.innerHTML='';Object.keys(stageVids).forEach(k=>delete stageVids[k]);
  PEOPLE.forEach(p=>{
    const t=document.createElement('div');t.className='stile';t.id='stile-'+p.id;t.style.display='none';
    t.innerHTML=`<div class="sph"><div class="av" style="background:${hsl(p.hue,55,45)}">${p.initials}</div></div>
      <div class="sgl"></div><div class="snm">${p.name}${p.host?'<span class="h">Host</span>':''}</div>`;
    if(!p.host){
      const ctl=document.createElement('div');ctl.className='tctl';
      ctl.innerHTML=`<button class="tmute" title="mute / unmute ${p.name}"></button>`
        +`<button class="tnext" title="next clip for ${p.name}"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>`;
      t.appendChild(ctl);
      ctl.querySelector('.tmute').onclick=e=>{e.stopPropagation();tileToggleAudio(p.id);};
      ctl.querySelector('.tnext').onclick=e=>{e.stopPropagation();tileNextClip(p.id);};
      t.addEventListener('click',e=>{ if(e.target.closest('.tctl'))return; TR.on?stageHear(p.id):tileNextClip(p.id); });
      t.style.cursor='pointer';
    }
    sgrid.appendChild(t);
  });
  buildDock();
}
function buildDock(){
  const dock=document.getElementById('sdock');dock.innerHTML='';
  SORDER.forEach((k,i)=>{const s=SCENES[k];const b=document.createElement('button');b.className='sc-scene';b.dataset.k=k;

  AI.forEach(p=>{
    const g=document.createElement('div');g.className='grp';
    g.innerHTML=`<span class="gp">${p.initials}</span>`;
    const bSpk=mkDockBtn('Spk',()=>setFlag(p.id,'spk',!ST.flags[p.id].spk,true));bSpk.dataset.p=p.id;bSpk.dataset.f='spk';
    const bMut=mkDockBtn('Mut',()=>setFlag(p.id,'mut',!ST.flags[p.id].mut));bMut.dataset.p=p.id;bMut.dataset.f='mut';
    const bGl=mkDockBtn('Gl',()=>setFlag(p.id,'gl',!ST.flags[p.id].gl));bGl.dataset.p=p.id;bGl.dataset.f='gl';

function mkDockBtn(t,fn){const b=document.createElement('button');b.textContent=t;b.onclick=fn;return b;}
function refreshDock(){document.querySelectorAll('#sdock .grp button').forEach(b=>{const f=ST.flags[b.dataset.p];if(f)b.classList.toggle('on',f[b.dataset.f]);});}

/* enter / exit stage */
function enterStage(){
  ST.inStage=true;
  const el=document.getElementById('stage');
  el.classList.add('on');
  document.getElementById('sdock').classList.add('hidden');
  const cast = PEOPLE.filter(p=>ST.live[p.id] && !p.host).map(p=>p.id);
  if(!cast.length){
    AI.forEach(p=>{ if(LANES[p.id] && LANES[p.id][0]) ST.live[p.id]=LANES[p.id][0]; });
  }
  ST.onstage = new Set(PEOPLE.filter(p=>ST.live[p.id] || p.host).map(p=>p.id));
  refreshStageLayout();
  PEOPLE.forEach(p=>{const cid=ST.live[p.id]; if(cid) goLive(p.id,cid);});
  applyAudio(); refreshHear();
  stageIdleArm();
  if(el.requestFullscreen)el.requestFullscreen().catch(()=>{});
}
let stageIdleT=null;
function stageIdleArm(){
  const el=document.getElementById('stage');
  const onMove=(e)=>{el.classList.remove('idle');clearTimeout(stageIdleT);
    stageIdleT=setTimeout(()=>{if(ST.inStage)el.classList.add('idle');},2800);
    el.classList.toggle('peek', !!(e && e.clientY!=null && e.clientY<70));};
  el.onmousemove=onMove;
  el.ontouchstart=e=>{el.classList.add('peek');onMove();setTimeout(()=>el.classList.remove('peek'),2600);};
  onMove();
}
function exitStage(){ST.inStage=false;document.getElementById('stage').classList.remove('on');
  if(document.fullscreenElement&&document.exitFullscreen)document.exitFullscreen().catch(()=>{});}
document.getElementById('golive').onclick=enterStage;
document.getElementById('exitStage').onclick=exitStage;
document.getElementById('shide').onclick=toggleDock;
document.getElementById('sLeave').onclick=()=>{trHold();exitStage();};
function toggleDock(){const d=document.getElementById('sdock');d.classList.toggle('hidden');
  document.getElementById('shide').textContent=d.classList.contains('hidden')?'SHOW CONTROLS (H)':'HIDE CONTROLS (H)';}

/* camera */
let camOn=false;const HOST=PEOPLE.find(p=>p.host)||PEOPLE[0];
async function toggleCamera(){
  const t=document.getElementById('stile-'+HOST.id);if(!t){toast('start the meeting first');return;}
  if(camOn){
    liveStream&&liveStream.getTracks().forEach(x=>x.stop());liveStream=null;camOn=false;
    const v=t.querySelector('video.live');if(v){v.srcObject=null;v.remove();}
    t.classList.remove('has','mir');reflectCamBtn();toast('camera off');return;
  }
  try{liveStream=await navigator.mediaDevices.getUserMedia({video:{width:1920,height:1080,facingMode:'user'},audio:true});
    ST.onstage.add(HOST.id);if(ST.inStage)refreshStageLayout();
    let v=t.querySelector('video.live');if(!v){v=document.createElement('video');v.className='live on';v.autoplay=true;v.muted=true;v.playsInline=true;t.insertBefore(v,t.querySelector('.sph'));}
    v.srcObject=liveStream;t.classList.add('has','mir');camOn=true;reflectCamBtn();toast('camera on');
  }catch(e){toast('no camera access');}
}

const TH={on:false,queue:[],i:0};const thv=document.getElementById('thv');
function theatreLane(pid){theatreRun(LANES[pid].map(cid=>({pid,cid})),P[pid].name);}
function theatreAll(){const q=[];AI.forEach(p=>LANES[p.id].forEach(cid=>q.push({pid:p.id,cid})));theatreRun(q,'WHOLE TABLE');}
function theatreRun(queue,label){if(!queue.length){toast('lane is empty');return;}TH.on=true;TH.queue=queue;TH.i=0;TH.label=label;
  document.getElementById('theatre').classList.add('on');buildRail();
  const el=document.getElementById('theatre');if(el.requestFullscreen)el.requestFullscreen().catch(()=>{});thShow();}
function buildRail(){const rail=document.getElementById('thRail');rail.innerHTML='';
  TH.queue.forEach((q,i)=>{const c=CLIP[q.cid];const seg=document.createElement('div');seg.className='thSeg';
    seg.innerHTML=`<span class="fill"></span><span class="lb">${P[q.pid].initials}·${c.label}</span>`;seg.onclick=()=>{TH.i=i;thShow();};rail.appendChild(seg);});}
function railUpdate(){[...document.getElementById('thRail').children].forEach((s,i)=>{s.classList.toggle('cur',i===TH.i);s.classList.toggle('done',i<TH.i);
  s.querySelector('.fill').style.width=i<TH.i?'100%':i===TH.i?((thv.duration?thv.currentTime/thv.duration:0)*100)+'%':'0';});}
function thShow(){const q=TH.queue[TH.i];if(!q){thExit();return;}const c=CLIP[q.cid];thv.src=c.src;thv.currentTime=0;thv.muted=false;thv.play().catch(()=>{});
  document.getElementById('thHud').textContent=TH.label+' · '+(TH.i+1)+'/'+TH.queue.length+' · '+P[q.pid].name+' · '+c.label;railUpdate();}
thv.addEventListener('ended',()=>{if(!TH.on)return;TH.i++;if(TH.i>=TH.queue.length){thExit();return;}thShow();});
thv.addEventListener('timeupdate',railUpdate);
function thExit(){TH.on=false;document.getElementById('theatre').classList.remove('on');thv.pause();if(document.fullscreenElement&&document.exitFullscreen)document.exitFullscreen().catch(()=>{});}
document.getElementById('thX').onclick=thExit;document.getElementById('theatreAll').onclick=theatreAll;
document.querySelectorAll('#thCtl button').forEach(b=>b.onclick=()=>{const c=b.dataset.c;
  if(c==='prev'){TH.i=Math.max(0,TH.i-1);thShow();}else if(c==='next'){TH.i=Math.min(TH.queue.length-1,TH.i+1);thShow();}else if(c==='pp'){thv.paused?thv.play():thv.pause();}});

/* ============ RECORD A TAKE ============ */
let mediaRec=null, recChunks=[];
document.getElementById('recBtn').onclick=async()=>{
  const btn=document.getElementById('recBtn');
  if(mediaRec&&mediaRec.state==='recording'){mediaRec.stop();return;}
  try{
    const disp=await navigator.mediaDevices.getDisplayMedia({video:{frameRate:30},audio:true});
    const tracks=[...disp.getVideoTracks(),...disp.getAudioTracks(),...(liveStream?liveStream.getAudioTracks():[])];
    const out=new MediaStream(tracks);
    const mime=['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'].find(m=>MediaRecorder.isTypeSupported(m))||'';
    recChunks=[]; mediaRec=new MediaRecorder(out,mime?{mimeType:mime,videoBitsPerSecond:12e6}:undefined);
    mediaRec.ondataavailable=e=>{if(e.data.size)recChunks.push(e.data);};
    mediaRec.onstop=()=>{disp.getTracks().forEach(t=>t.stop());
      const blob=new Blob(recChunks,{type:mediaRec.mimeType||'video/webm'});
      const a=document.createElement('a');a.href=URL.createObjectURL(blob);
      a.download='scene_zero_take_'+new Date().toISOString().replace(/[:.]/g,'-')+'.webm';a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href),5000);
      btn.textContent='REC';btn.classList.remove('on');toast('take saved');};
    disp.getVideoTracks()[0].onended=()=>{if(mediaRec&&mediaRec.state==='recording')mediaRec.stop();};
    mediaRec.start(1000); btn.textContent='● STOP';btn.classList.add('on');
    toast('recording — pick this tab/window, then ▶ SCORE');
  }catch(e){toast('recording cancelled');}
};

/* ================================================================
   SCORE + TRANSPORT — the call plays itself.
   The table IS the score: row r = each lane's r-th clip; a lane
   shorter than the score holds its last clip (keeps reacting).
   One lane SPEAKS per row — rotating, unless overridden per row.
   A wall clock advances rows; every lane hard-cuts together at
   the boundary. Works standalone; the DIRECTOR window just cues it.
   ================================================================ */
const SCORE={rowDur:10,loop:true,spk:{}};
const TR={on:false,t0:0,row:-1,hold:null,timer:null};
const SCOREKEY='sceneZeroScore';
function loadScore(){try{const s=JSON.parse(localStorage.getItem(SCOREKEY)||'null');
  if(s){SCORE.rowDur=s.rowDur||10;SCORE.loop=s.loop!==false;SCORE.spk=s.spk||{};}}catch(e){}
  const inp=document.getElementById('rowDur');if(inp)inp.value=SCORE.rowDur;}
function saveScore(){try{localStorage.setItem(SCOREKEY,JSON.stringify(SCORE));}catch(e){}}
function scoreRows(){let m=0;AI.forEach(p=>{m=Math.max(m,(LANES[p.id]||[]).length);});return Math.min(m,24);}
function rowCell(pid,r){const l=LANES[pid]||[];return l.length?l[Math.min(r,l.length-1)]:null;}
function rowFresh(pid,r){return r<((LANES[pid]||[]).length);}
function rowSpeaker(r){
  const ids=AI.filter(p=>rowCell(p.id,r)).map(p=>p.id);if(!ids.length)return null;
  const o=SCORE.spk[r];if(o&&ids.includes(o))return o;
  const fresh=AI.filter(p=>rowFresh(p.id,r)).map(p=>p.id);
  const pool=fresh.length?fresh:ids;return pool[r%pool.length];
}
function enterRow(r){
  const n=scoreRows();if(!n){trStop();toast('no clips in any lane');return;}
  if(r>=n){if(SCORE.loop){TR.t0=performance.now();r=0;}else{trStop();toast('score complete');return;}}
  TR.row=r;
  AI.forEach(p=>{const cid=rowCell(p.id,r);if(cid)goLive(p.id,cid);});
  const spk=rowSpeaker(r);if(spk)stageHear(spk);
  scoreHUD();
  sendCue({t:'state',row:TR.row,n,spk:spk?P[spk].name:null,
           next:nextSpeakerName(r,n),dur:SCORE.rowDur});
}
function nextSpeakerName(r,n){const nr=(r+1)%n;const s=rowSpeaker(nr);return s?P[s].name:null;}
function trTick(){
  if(!TR.on)return;
  const t=(performance.now()-TR.t0)/1000;
  const r=Math.floor(t/SCORE.rowDur);
  if(r!==TR.row)enterRow(r);
  const left=SCORE.rowDur-(t%SCORE.rowDur);
  hudTime(left);
  if(!trTick._h||performance.now()-trTick._h>500){trTick._h=performance.now();
    sendCue({t:'state',row:TR.row,n:scoreRows(),left:+left.toFixed(1),
             spk:(TR.row>=0&&rowSpeaker(TR.row))?P[rowSpeaker(TR.row)].name:null,
             next:nextSpeakerName(Math.max(0,TR.row),scoreRows()),dur:SCORE.rowDur,on:true});}
}
function trGo(){
  if(IS_DIR){sendCue({t:'go'});return;}
  if(TR.on)return;
  if(!scoreRows()){toast('no clips in any lane');return;}
  if(!ST.inStage)enterStage();
  TR.on=true;
  const base=TR.hold!=null?TR.hold:(TR.row>=0?TR.row*SCORE.rowDur:0);
  TR.t0=performance.now()-base*1000;TR.hold=null;
  if(TR.row<0)enterRow(0);
  else Object.values(stageVids).forEach(b=>Object.values(b).forEach(v=>{if(v.classList.contains('on'))v.play().catch(()=>{});}));
  clearInterval(TR.timer);TR.timer=setInterval(trTick,100);
  scoreHUD();
}
function trHold(){
  if(IS_DIR){sendCue({t:'hold'});return;}
  if(!TR.on)return;
  TR.hold=(performance.now()-TR.t0)/1000;TR.on=false;clearInterval(TR.timer);
  Object.values(stageVids).forEach(b=>Object.values(b).forEach(v=>v.pause()));
  scoreHUD();sendCue({t:'state',row:TR.row,n:scoreRows(),on:false,held:true});
}
function trJump(r){
  if(IS_DIR){sendCue({t:'jump',row:r});return;}
  if(!ST.inStage)enterStage();
  TR.hold=null;TR.t0=performance.now()-r*SCORE.rowDur*1000;
  if(!TR.on){TR.on=true;clearInterval(TR.timer);TR.timer=setInterval(trTick,100);}
  enterRow(r);
}
function trStop(){TR.on=false;clearInterval(TR.timer);TR.row=-1;TR.hold=null;scoreHUD();}
function cycleSpk(r){
  const ids=AI.filter(p=>rowCell(p.id,r)).map(p=>p.id);if(!ids.length)return;
  const cur=rowSpeaker(r);const i=ids.indexOf(cur);
  SCORE.spk[r]=ids[(i+1)%ids.length];saveScore();scoreHUD();
  if(IS_DIR)sendCue({t:'score',score:SCORE});
  else if(TR.row===r)stageHear(SCORE.spk[r]);
  toast('row '+(r+1)+' speaker: '+P[SCORE.spk[r]].name);
}
function scoreHUD(){
  const n=scoreRows();
  const st=document.getElementById('score');st.innerHTML='';
  if(n){const l=document.createElement('span');l.className='lbl';l.textContent='SCORE';st.appendChild(l);}
  for(let r=0;r<n;r++){
    const spk=rowSpeaker(r);
    const chip=document.createElement('div');chip.className='rowchip'+(r===TR.row?' cur':'');
    chip.innerHTML=`<b>${r+1}</b><span class="sb" style="background:${spk?hsl(P[spk].hue,55,45):'#333'}">${spk?P[spk].initials:'·'}</span>`;
    chip.title=(spk?P[spk].name+' speaks':'empty')+' — click: cue this row · right-click: change speaker';
    chip.onclick=e=>{if(e.shiftKey)cycleSpk(r);else trJump(r);};
    chip.oncontextmenu=e=>{e.preventDefault();cycleSpk(r);};
    st.appendChild(chip);
  }
  const gb=document.getElementById('scoreGo');
  if(gb){gb.textContent=TR.on?'❚❚ HOLD':'▶ SCORE';gb.classList.toggle('on',TR.on);}
  const spk=TR.row>=0?rowSpeaker(TR.row):null;
  const txt=TR.row>=0?`ROW ${TR.row+1}/${n} · ${spk?P[spk].name:'—'}`:(TR.hold!=null?'HELD':'');
  const ro=document.getElementById('srow');if(ro)ro.textContent=txt;
  const sr=document.getElementById('stageRow');if(sr)sr.textContent=txt;
}
function hudTime(left){
  const txtL=' · -'+left.toFixed(1)+'s';
  const n=scoreRows(),spk=TR.row>=0?rowSpeaker(TR.row):null;
  const base=TR.row>=0?`ROW ${TR.row+1}/${n} · ${spk?P[spk].name:'—'}`:'';
  const ro=document.getElementById('srow');if(ro)ro.textContent=base+(TR.on?txtL:'');
  const sr=document.getElementById('stageRow');if(sr)sr.textContent=base+(TR.on?txtL:'');
}
document.getElementById('scoreGo').onclick=()=>TR.on?trHold():trGo();
document.getElementById('rowDur').onchange=e=>{
  SCORE.rowDur=Math.max(2,Math.min(60,+e.target.value||10));e.target.value=SCORE.rowDur;saveScore();
  if(TR.on){TR.t0=performance.now()-TR.row*SCORE.rowDur*1000;}   // re-anchor so the current row restarts cleanly
  scoreHUD();if(IS_DIR)sendCue({t:'score',score:SCORE});
  buildTable();
};

/* ============ CUE CHANNEL — director <-> stage (same-origin windows) ============ */
const CHAN='scene-zero';
const IS_DIR=new URLSearchParams(location.search).has('director');
let bc=null;try{bc=new BroadcastChannel(CHAN);}catch(e){}
function sendCue(m){if(bc)try{bc.postMessage(m);}catch(e){}
  try{localStorage.setItem(CHAN+'-cue',JSON.stringify({...m,_n:Math.random()}));}catch(e){}}
let DIRSTATE=null,dirSeen=0;
function dirHUD(){
  const s=DIRSTATE;if(!s)return;dirSeen=performance.now();
  document.getElementById('dNow').textContent=s.row!=null&&s.row>=0?('ROW '+(s.row+1)+'/'+s.n+(s.spk?' · '+s.spk:'')):'—';
  document.getElementById('dCd').textContent=s.left!=null?('-'+s.left+'s'):(s.held?'HELD':'');
  document.getElementById('dNext').innerHTML=s.next?('next: <b>'+s.next+'</b>'):'';
  const lk=document.getElementById('dLink');lk.textContent='stage: connected';lk.classList.add('ok');
  // mirror the playing row into the strip
  if(typeof s.row==='number'&&s.row!==TR.row){TR.row=s.row;scoreHUD();}
}
setInterval(()=>{if(IS_DIR&&performance.now()-dirSeen>4000){const lk=document.getElementById('dLink');
  lk.textContent='stage: not detected — open '+location.pathname.split('/').pop()+' (no ?director) in another window';lk.classList.remove('ok');}},2000);
function handleCue(m){
  if(!m||typeof m!=='object')return;
  if(IS_DIR){if(m.t==='state')DIRSTATE=m,dirHUD();return;}
  switch(m.t){
    case 'go':trGo();break;
    case 'hold':trHold();break;
    case 'jump':trJump(m.row|0);break;
    case 'score':Object.assign(SCORE,m.score);saveScore();
      const inp=document.getElementById('rowDur');if(inp)inp.value=SCORE.rowDur;
      if(TR.on)TR.t0=performance.now()-TR.row*SCORE.rowDur*1000;scoreHUD();break;
    case 'table':loadTable();buildTable();buildStage();scoreHUD();
      if(TR.on)enterRow(TR.row);break;
    case 'hear':stageHear(m.pid);break;
    case 'aud':{const a=ST.aud[m.pid];if(a){a.on=!!m.on;if(m.on)ST.master=true;applyAudio();}break;}
    case 'nexttake':{const l=LANES[m.pid]||[];if(l.length>1){const i=l.indexOf(ST.live[m.pid]);goLive(m.pid,l[(i+1)%l.length]);applyAudio();}break;}
    case 'flag':setFlag(m.pid,m.f,m.on);break;
    case 'clip':{const cid=(LANES[m.pid]||[]).find(x=>CLIP[x]&&CLIP[x].file===m.file);if(cid)goLive(m.pid,cid);break;}
  }
}
if(bc)bc.onmessage=e=>handleCue(e.data);
window.addEventListener('storage',e=>{if(e.key===CHAN+'-cue'&&e.newValue){try{handleCue(JSON.parse(e.newValue));}catch(_){}}});
document.getElementById('dirBtn').onclick=()=>{
  if(IS_DIR){toast('this IS the director');return;}
  window.open(location.pathname+'?director=1','sceneZeroDirector','width=1200,height=760');
  toast('director opened — it cues this window');
};


/* ---- REMOTE: cross-device cue bus (phone / second machine) over the thunder relay ----
   BroadcastChannel only reaches windows on THIS machine. For a QR-paired controller on
   another device, cues travel via the already-deployed Cloudflare DO relay
   (thunder-rigs-relay.hartswf0.workers.dev): join a room, POST cues, poll for them.
   REMOTE button = create/join room + show the QR. ?remote=CODE = the controller panel. */
const RELAY='https://thunder-rigs-relay.hartswf0.workers.dev/trig/';
const IS_REMOTE=(new URLSearchParams(location.search).get('remote')||'').toUpperCase()||null;
const ROOM_OVERRIDE=(new URLSearchParams(location.search).get('room')||'').toUpperCase().replace(/[^A-Z0-9-]/g,'')||null;
const relay={room:null,peer:null,after:0,on:false,timer:null,lastState:0};
async function relayJoin(code,name){
  relay.room=String(code).toUpperCase().replace(/[^A-Z0-9-]/g,'').slice(0,16);
  try{
    const r=await fetch(RELAY+encodeURIComponent(relay.room)+'/join',{method:'POST',body:JSON.stringify({name})});
    const d=await r.json();if(!d.peerId)return false;
    relay.peer=d.peerId;relay.after=d.seq||0;relay.on=true;
    clearInterval(relay.timer);relay.timer=setInterval(relayPoll,IS_REMOTE?700:900);
    setTimeout(pullSnapshot,300);   // late joiner (remote included) catches up from the room snapshot
    return true;
  }catch(e){return false;}
}
async function relayPoll(){
  if(!relay.on)return;
  try{
    /* no-store is load-bearing: the relay sends no Cache-Control, so a repeated
       same-URL GET (quiet room -> same 'after') gets served from HTTP cache forever
       and the poll loop wedges on a stale empty response */
    const r=await fetch(RELAY+encodeURIComponent(relay.room)+'/poll?peerId='+relay.peer+'&after='+relay.after,{cache:'no-store'});
    const d=await r.json();
    if(typeof d.seq==='number'&&d.seq<relay.after)relay.after=d.seq;   // DO evicted & seq rewound
    (d.messages||[]).forEach(m=>{
      if(m.seq>relay.after)relay.after=m.seq;
      if(m.from!==relay.peer&&m.msg&&m.msg.t){
        if(IS_REMOTE){
          if(m.msg.t==='state')remoteState(m.msg);
          else if(m.msg.t==='table'||m.msg.t==='score'){handleCue(m.msg);if(typeof remoteGrid==='function')remoteGrid();}
        }else handleCue(m.msg);
      }
    });
  }catch(e){}
}
document.addEventListener('visibilitychange',()=>{   // a re-surfaced window catches up instantly
  if(document.visibilityState==='visible'&&relay.on)relayPoll();});
function relaySend(m){
  if(!relay.on)return;
  if(m.t==='state'){const now=performance.now();if(now-relay.lastState<1200)return;relay.lastState=now;}
  fetch(RELAY+encodeURIComponent(relay.room)+'/send',{method:'POST',body:JSON.stringify({peerId:relay.peer,msg:m})}).catch(()=>{});
}
/* every cue the page sends also rides the relay once a room is joined */
const __send0=sendCue;sendCue=function(m){
  if(m&&m.t==='state'){try{m.rowDur=SCORE.rowDur;m.spkPid=(m.row!=null&&m.row>=0)?rowSpeaker(m.row):null;m.auds=Object.fromEntries(AI.map(p=>[p.id,!!(ST.aud[p.id]&&ST.aud[p.id].on)]));}catch(e){}}
  __send0(m);relaySend(m);
};
function myRoom(){
  /* the whole hartswf0.github.io origin shares ONE ~5MB localStorage (thunder-rigs,
     decks, scenes...) — it can be FULL. Never let storage kill the room: memory first,
     storage only as a best-effort convenience. */
  if(ROOM_OVERRIDE)return ROOM_OVERRIDE;
  if(myRoom._m)return myRoom._m;
  const k=CHAN+'-room';let r=null;
  try{r=localStorage.getItem(k);}catch(e){}

/* ---- EDIT-SYNC: the table itself travels ----
   Every table edit broadcasts a versioned payload (debounced) AND stores it as the
   room snapshot on the relay; every joining window pulls the snapshot first. So a
   phone or second computer that arrives late still gets the current lanes/clips,
   and simultaneous edits resolve last-write-wins by version. Apply never
   re-broadcasts (echo-proof); versions guard replays. */
let lastAppliedVer=0,tableTimer=null;
function broadcastTable(){
  clearTimeout(tableTimer);
  tableTimer=setTimeout(()=>{
    const data=tableData();if(!data)return;
    let s='';try{s=JSON.stringify(data);}catch(e){return;}
    if(s.length>120000){toast('table too big to sync');return;}
    const v=Date.now();lastAppliedVer=v;
    sendCue({t:'table',v,data});
    if(relay.on)fetch(RELAY+encodeURIComponent(relay.room)+'/snapshot',
      {method:'POST',body:JSON.stringify({peerId:relay.peer,snapshot:{v,data}})}).catch(()=>{});
  },400);
}
async function pullSnapshot(){
  if(!relay.on)return;
  try{
    const r=await fetch(RELAY+encodeURIComponent(relay.room)+'/snapshot',{cache:'no-store'});
    const d=await r.json();const sn=d&&d.snapshot;
    if(sn&&sn.data&&(sn.v||0)>lastAppliedVer)applyTableData(sn.v,sn.data);
  }catch(e){}
}
const __save0=saveTable;saveTable=function(){__save0();broadcastTable();};
const __hc1=handleCue;handleCue=function(m){
  if(m&&m.t==='table'&&m.data){applyTableData(m.v||0,m.data);if(IS_REMOTE&&typeof remoteGrid==='function')remoteGrid();return;}
  __hc1(m);
};
function tableData(){
  const clips={};Object.values(CLIP).forEach(c=>{if(c.file)clips[c.id]={label:c.label,file:c.file};});
  const lanes={};AI.forEach(p=>lanes[p.id]=(LANES[p.id]||[]).filter(id=>CLIP[id]&&CLIP[id].file));
  return {people:AI.map(p=>({id:p.id,name:p.name,hue:p.hue,initials:p.initials})),clips,lanes,score:SCORE,cc:cCounter};
}
function applyTableData(v,data){
  if(v&&v<=lastAppliedVer)return;lastAppliedVer=v||Date.now();
  try{
    CLIP={};AI.length=0;PEOPLE.length=1;
    Object.keys(P).forEach(k=>{if(k!=='nat')delete P[k];});
    Object.keys(LANES).forEach(k=>delete LANES[k]);
    (data.people||[]).forEach(pp=>{const p={id:pp.id,name:pp.name,hue:pp.hue,initials:pp.initials};
      PEOPLE.push(p);P[p.id]=p;AI.push(p);
      ST.aud[p.id]=ST.aud[p.id]||{on:false,vol:1,solo:false,vo:null};
      ST.flags[p.id]=ST.flags[p.id]||{spk:false,mut:false,gl:false};LANES[p.id]=[];});
    Object.entries(data.clips||{}).forEach(([id,c])=>CLIP[id]={id,label:c.label,file:c.file,src:DIR+encodeURIComponent(c.file)});
    Object.entries(data.lanes||{}).forEach(([pid,ids])=>{if(LANES[pid])LANES[pid]=ids.filter(id=>CLIP[id]);});
    cCounter=Math.max(cCounter,(data.cc||0));
    Object.keys(ST.live).forEach(pid=>{if(!CLIP[ST.live[pid]])delete ST.live[pid];});
    if(data.score){Object.assign(SCORE,data.score);const i=document.getElementById('rowDur');if(i)i.value=SCORE.rowDur;saveScore();}
    __save0();
    buildTable();buildStage();scoreHUD();
    if(TR.on)enterRow(TR.row);
    toast('table synced');
  }catch(e){toast('table sync failed');}
}
